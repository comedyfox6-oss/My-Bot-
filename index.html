<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Риан</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ПЕРЕМЕННЫЕ ТЕМ */
        :root {
            --bg: #0d0d0f; --surface: #1a1a1f; --surface2: #222228; --border: #2e2e38;
            --user-bubble: #2563eb; --bot-bubble: #1e1e26; --text: #f0f0f5; --text-muted: #8888a0;
            --accent: #3b82f6; --radius: 18px; --sidebar-w: 280px;
        }

        body.light {
            --bg: #f5f5f7; --surface: #ffffff; --surface2: #f0f0f2; --border: #e5e5e7;
            --user-bubble: #007aff; --bot-bubble: #e9e9eb; --text: #1a1a1f; --text-muted: #6e6e73;
            --accent: #007aff;
        }

        body.blue {
            --bg: #0a192f; --surface: #112240; --surface2: #1d2d50; --border: #233554;
            --user-bubble: #64ffda; --bot-bubble: #172a45; --text: #ccd6f6; --text-muted: #8892b0;
            --accent: #64ffda;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            transition: background 0.3s ease, color 0.3s ease;
            overflow: hidden;
            height: 100vh;
            display: flex;
        }

        /* САЙДБАР (МЕНЮ) */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--surface); /* НЕ ПРОЗРАЧНЫЙ */
            border-right: 1px solid var(--border);
            height: 100%;
            display: flex;
            flex-direction: column;
            position: fixed;
            left: calc(-1 * var(--sidebar-w));
            z-index: 1000;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.3);
        }

        .sidebar.open { left: 0; }

        .sidebar-header {
            padding: 20px;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .theme-selector {
            padding: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .theme-btn {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }

        .theme-btn:hover { border-color: var(--accent); }
        .theme-btn.active { background: var(--accent); color: #fff; }

        /* ОСНОВНОЙ ЧАТ */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        .top-bar {
            height: 60px;
            padding: 0 15px;
            display: flex;
            align-items: center;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            gap: 15px;
        }

        .burger {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 15px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        .user-msg { 
            align-self: flex-end; 
            background: var(--user-bubble); 
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .bot-msg { 
            align-self: flex-start; 
            background: var(--bot-bubble); 
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 15px;
            background: var(--bg);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 12px 18px;
            border-radius: 25px;
            color: var(--text);
            outline: none;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Overlay для закрытия меню кликом по пустому месту */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>Настройки</span>
            <button class="theme-btn" onclick="toggleMenu()" style="max-width: 40px;">×</button>
        </div>
        
        <div style="padding: 20px 20px 0; font-size: 14px; color: var(--text-muted);">Выберите тему:</div>
        <div class="theme-selector">
            <button class="theme-btn active" id="t-dark" onclick="applyTheme('dark')">Тёмная</button>
            <button class="theme-btn" id="t-light" onclick="applyTheme('light')">Светлая</button>
            <button class="theme-btn" id="t-blue" onclick="applyTheme('blue')">Синяя</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div class="burger" onclick="toggleMenu()">☰</div>
            <div style="font-weight: 600;">Риан</div>
        </header>

        <div class="chat-container" id="chat">
            <div class="msg bot-msg">Привет, Саня! Теперь темы работают, а меню не просвечивает. Проверяй.</div>
        </div>

        <div class="input-area">
            <input type="text" placeholder="Напиши что-нибудь..." id="userInput">
            <button class="burger" onclick="sendMessage()">🚀</button>
        </div>
    </main>

    <script>
        // ЛОГИКА ТЕМ
        function applyTheme(name) {
            // Удаляем старые классы
            document.body.classList.remove('light', 'blue');
            
            // Снимаем активность со всех кнопок
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));

            if (name !== 'dark') {
                document.body.classList.add(name);
            }
            
            // Ставим активную кнопку
            document.getElementById('t-' + name).classList.add('active');
            
            // Сохраняем в память
            localStorage.setItem('theme', name);
        }

        // Загрузка темы при старте
        const savedTheme = localStorage.getItem('theme') || 'dark';
        applyTheme(savedTheme);

        // ЛОГИКА МЕНЮ
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        // БАЗОВЫЙ ЧАТ (ДЛЯ ТЕСТА)
        function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="msg user-msg">${text}</div>`;
            input.value = '';
            
            // Типа ответ
            setTimeout(() => {
                chat.innerHTML += `<div class="msg bot-msg">Принял: "${text}". Код работает!</div>`;
                chat.scrollTop = chat.scrollHeight;
            }, 500);
        }
    </script>
</body>
</html>
