<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Риан</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: -webkit-fill-available; }

body {
font-family: -apple-system, system-ui, sans-serif;
font-size: 16px;
height: 100dvh;
min-height: -webkit-fill-available;
overflow: hidden;
display: flex;
flex-direction: column;
}

/* CSS переменные для тем */
body.dark {
–bg: #0f0f11;
–surface: #161618;
–surface2: #1e1e22;
–border: #2a2a30;
–text: #f0f0f5;
–text2: #777;
–user-bg: #2563eb;
–user-text: #ffffff;
–bot-bg: #1e1e26;
–bot-text: #f0f0f5;
–btn-bg: #1e1e26;
–btn-border: #2a2a30;
–btn-text: #777;
–input-bg: #1e1e22;
–input-text: #f0f0f5;
–input-placeholder: #555;
–accent: #3b82f6;
–sep-bg: #1e1e22;
–sep-text: #555;
background: var(–bg);
color: var(–text);
}
body.light {
–bg: #f0f2f5;
–surface: #ffffff;
–surface2: #e8eaed;
–border: #d1d5db;
–text: #111827;
–text2: #6b7280;
–user-bg: #2563eb;
–user-text: #ffffff;
–bot-bg: #ffffff;
–bot-text: #111827;
–btn-bg: #e8eaed;
–btn-border: #d1d5db;
–btn-text: #6b7280;
–input-bg: #ffffff;
–input-text: #111827;
–input-placeholder: #9ca3af;
–accent: #2563eb;
–sep-bg: #e8eaed;
–sep-text: #9ca3af;
background: var(–bg);
color: var(–text);
}

/* OVERLAY */
#overlay {
display: none;
position: fixed;
inset: 0;
background: rgba(0,0,0,.5);
z-index: 99;
}
#overlay.on { display: block; }

/* SIDEBAR */
#sidebar {
width: 270px;
height: 100%;
background: var(–surface);
border-right: 1px solid var(–border);
display: flex;
flex-direction: column;
position: fixed;
top: 0; left: 0;
z-index: 100;
transform: translateX(-100%);
transition: transform .22s ease;
}
#sidebar.on { transform: translateX(0); }

.sb-top {
padding: 16px;
border-bottom: 1px solid var(–border);
display: flex;
align-items: center;
gap: 10px;
}
.sb-top img { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; }
.sb-top-name { font-size: 14px; font-weight: 600; color: var(–text); }
.sb-top-sub { font-size: 12px; color: var(–text2); }

.sb-new {
margin: 10px;
padding: 10px 14px;
background: var(–accent);
border: none;
border-radius: 10px;
color: #fff;
font-size: 14px;
font-weight: 600;
cursor: pointer;
font-family: inherit;
display: flex;
align-items: center;
gap: 6px;
}

.sb-section { padding: 10px 14px 4px; font-size: 11px; color: var(–text2); text-transform: uppercase; letter-spacing: .08em; }
#chat-list { flex: 1; overflow-y: auto; padding: 0 6px; }
#chat-list::-webkit-scrollbar { width: 0; }

.ci {
display: flex;
align-items: center;
gap: 8px;
padding: 9px 10px;
border-radius: 8px;
cursor: pointer;
color: var(–text);
transition: background .1s;
margin-bottom: 1px;
}
.ci:hover { background: var(–surface2); }
.ci.on { background: rgba(59,130,246,.12); color: var(–accent); }
.ci svg { width: 14px; height: 14px; opacity: .5; flex-shrink: 0; }
.ci span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
.ci-del { color: var(–text2); font-size: 13px; padding: 2px 4px; display: none; }
.ci:hover .ci-del { display: block; }

/* MAIN — фиксированная шапка, скроллится только чат */
#main {
flex: 1;
display: flex;
flex-direction: column;
height: 100dvh;
min-height: -webkit-fill-available;
overflow: hidden;
}

/* HEADER — фиксированный */
#hdr {
display: flex;
align-items: center;
gap: 10px;
padding: 10px 14px;
background: var(–surface);
border-bottom: 1px solid var(–border);
flex-shrink: 0;
z-index: 10;
}
.hdr-btn {
background: none;
border: none;
color: var(–text2);
cursor: pointer;
padding: 4px;
display: flex;
align-items: center;
}
#hdr img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
#hdr-info { flex: 1; }
#hdr-name { font-size: 15px; font-weight: 600; color: var(–text); }
#hdr-status { font-size: 12px; color: #22c55e; }

/* CHAT — скроллится сам */
#chat-wrap {
flex: 1;
overflow: hidden;
display: flex;
flex-direction: column;
position: relative;
}

#chat {
flex: 1;
overflow-y: auto;
padding: 14px 12px 8px;
display: flex;
flex-direction: column;
gap: 6px;
-webkit-overflow-scrolling: touch;
background: var(–bg);
}
#chat::-webkit-scrollbar { width: 0; }

.dsep {
align-self: center;
font-size: 12px;
color: var(–sep-text);
background: var(–sep-bg);
padding: 3px 12px;
border-radius: 20px;
margin: 4px 0;
}

.msg { display: flex; flex-direction: column; max-width: 82%; gap: 3px; }
.msg.u { align-self: flex-end; align-items: flex-end; }
.msg.b { align-self: flex-start; align-items: flex-start; }

.b-row { display: flex; align-items: flex-end; gap: 7px; }
.b-av { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
.b-lbl { font-size: 11px; color: var(–text2); margin-left: 33px; margin-bottom: 2px; }

.bbl {
padding: 10px 14px;
border-radius: 18px;
font-size: 16px;
line-height: 1.55;
word-break: break-word;
white-space: pre-wrap;
}
.msg.u .bbl {
background: var(–user-bg);
color: var(–user-text) !important;
-webkit-text-fill-color: var(–user-text) !important;
border-bottom-right-radius: 4px;
}
.msg.b .bbl {
background: var(–bot-bg);
color: var(–bot-text) !important;
-webkit-text-fill-color: var(–bot-text) !important;
border: 1px solid var(–border);
border-bottom-left-radius: 4px;
}

.bbl.ed {
outline: 2px solid var(–accent);
cursor: text;
}

.acts {
display: flex;
gap: 4px;
align-items: center;
padding: 2px 0;
flex-wrap: wrap;
}
.msg.b .acts { margin-left: 33px; }
.ts { font-size: 11px; color: var(–text2); margin-right: 2px; }
.abtn {
display: flex;
align-items: center;
gap: 3px;
background: var(–btn-bg);
border: 1px solid var(–btn-border);
color: var(–btn-text);
font-size: 12px;
padding: 3px 9px;
border-radius: 20px;
cursor: pointer;
font-family: inherit;
transition: all .1s;
}
.abtn:hover { color: var(–text); }
.abtn.ok { color: #22c55e; border-color: #22c55e; }
.abtn.act { background: var(–accent); color: #fff; border-color: var(–accent); }

/* TYPING */
#typing {
display: none;
align-self: flex-start;
background: var(–bot-bg);
border: 1px solid var(–border);
border-radius: 18px;
border-bottom-left-radius: 4px;
padding: 12px 16px;
margin-left: 33px;
}
#typing span {
display: inline-block;
width: 6px; height: 6px;
background: var(–text2);
border-radius: 50%;
margin: 0 2px;
animation: bc 1.2s infinite;
}
#typing span:nth-child(2) { animation-delay: .2s; }
#typing span:nth-child(3) { animation-delay: .4s; }
@keyframes bc { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

/* INPUT — как у ChatGPT/Claude */
#inp-area {
padding: 10px 12px 16px;
background: var(–surface);
border-top: 1px solid var(–border);
flex-shrink: 0;
}

#inp-wrap {
display: flex;
align-items: flex-end;
background: var(–input-bg);
border: 1.5px solid var(–border);
border-radius: 16px;
padding: 8px 8px 8px 14px;
gap: 8px;
transition: border-color .2s;
}
#inp-wrap:focus-within { border-color: var(–accent); }

#inp {
flex: 1;
background: none;
border: none;
outline: none;
color: var(–input-text) !important;
-webkit-text-fill-color: var(–input-text) !important;
font-size: 16px;
font-family: inherit;
resize: none;
line-height: 1.5;
max-height: 150px;
min-height: 24px;
overflow-y: auto;
caret-color: var(–accent);
}
#inp::placeholder {
color: var(–input-placeholder) !important;
-webkit-text-fill-color: var(–input-placeholder) !important;
}
#inp::-webkit-scrollbar { width: 0; }

#send {
width: 36px; height: 36px;
border-radius: 10px;
background: var(–accent);
border: none;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
transition: transform .1s, opacity .2s;
opacity: 0.5;
}
#send.ready { opacity: 1; }
#send:active { transform: scale(.9); }

/* NO KEY */
#nokey {
display: none;
flex: 1;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 32px;
gap: 14px;
text-align: center;
background: var(–bg);
}
#nokey.on { display: flex; }
#nokey h2 { font-size: 20px; font-weight: 600; color: var(–text); }
#nokey p { font-size: 15px; color: var(–text2); line-height: 1.5; }
#nokey button { padding: 12px 28px; background: var(–accent); border: none; border-radius: 12px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit; }

/* SETTINGS POPUP */
#s-overlay {
display: none;
position: fixed;
inset: 0;
background: rgba(0,0,0,.5);
z-index: 200;
align-items: flex-end;
justify-content: center;
}
#s-overlay.on { display: flex; }
#s-box {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 20px 20px 0 0;
padding: 20px 20px 32px;
width: 100%;
max-width: 480px;
max-height: 80vh;
overflow-y: auto;
animation: slideUp .25s ease;
}
@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.s-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.s-head h2 { font-size: 17px; font-weight: 700; color: var(–text); }
.s-close { background: var(–surface2); border: none; color: var(–text2); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
.s-lbl { font-size: 11px; color: var(–text2); text-transform: uppercase; letter-spacing: .07em; font-weight: 700; margin-bottom: 8px; }
.s-sec { margin-bottom: 20px; }
.s-btns { display: flex; gap: 8px; }
.s-btn {
flex: 1; padding: 10px; border-radius: 10px;
border: 1.5px solid var(–border);
background: var(–surface2); color: var(–text2);
font-family: inherit; font-size: 14px; font-weight: 500;
cursor: pointer; text-align: center; transition: all .12s;
}
.s-btn.on { background: var(–accent); border-color: var(–accent); color: #fff; font-weight: 600; }
.s-inp {
width: 100%; background: var(–surface2); border: 1.5px solid var(–border);
border-radius: 10px; padding: 11px 14px;
color: var(–text) !important; -webkit-text-fill-color: var(–text) !important;
font-size: 15px; font-family: inherit; outline: none; margin-top: 6px;
}
.s-inp:focus { border-color: var(–accent); }
.s-hint { font-size: 12px; color: var(–text2); margin-top: 6px; line-height: 1.4; }
.s-save {
width: 100%; margin-top: 10px; padding: 13px;
background: var(–accent); border: none; border-radius: 12px;
color: #fff; font-size: 15px; font-weight: 700;
cursor: pointer; font-family: inherit;
}
.s-save:active { opacity: .85; }
.mem-list { display: flex; flex-direction: column; gap: 6px; max-height: 120px; overflow-y: auto; }
.mi {
background: var(–surface2); border: 1px solid var(–border);
border-radius: 8px; padding: 8px 12px; font-size: 14px;
display: flex; justify-content: space-between; align-items: center; gap: 8px;
color: var(–text);
}
.mi button { background: none; border: none; color: var(–text2); cursor: pointer; font-size: 14px; }
.mi button:hover { color: #ef4444; }
.mem-empty { color: var(–text2); font-size: 14px; text-align: center; padding: 10px 0; }
</style>

</head>

let chats = JSON.parse(localStorage.getItem('rc') || '{}');

let theme = localStorage.getItem('th') || 'dark';

// INIT
applyTheme(theme);
checkKey();
renderChatList();
const last = localStorage.getItem('lc');
if (last && chats[last]) switchChat(last); else newChat();

// === ТЕМА ===
function setTheme(t) {
  theme = t;
  localStorage.setItem('th', t);
  applyTheme(t);
}
function applyTheme(t) {
  document.body.className = t === 'light' ? 'light' : 'dark';
  document.getElementById('t-dark').classList.toggle('on', t !== 'light');
  document.getElementById('t-light').classList.toggle('on', t === 'light');
}

// === САЙДБАР ===
function openSB() {
  document.getElementById('sidebar').classList.add('on');
  document.getElementById('overlay').classList.add('on');
}
function closeSB() {
  document.getElementById('sidebar').classList.remove('on');
  document.getElementById('overlay').classList.remove('on');
}

// === НАСТРОЙКИ ===
function openSettings() {
  document.getElementById('api-inp').value = key;
  renderMem();
  document.getElementById('s-overlay').classList.add('on');
}
function closeSettings() {
  document.getElementById('s-overlay').classList.remove('on');
}
document.getElementById('s-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('s-overlay')) closeSettings();
});

function saveSettings() {
  const k = document.getElementById('api-inp').value.trim();
  if (k) {
    key = k;
    localStorage.setItem('gk', k);
    // Определяем тип ключа
    if (k.startsWith('sk-')) {
      keyType = 'openai';
    } else {
      keyType = 'groq';
    }
    localStorage.setItem('kt', keyType);
  }
  closeSettings();
  checkKey();
}

// === КЛЮЧ ===
function checkKey() {
  const chat = document.getElementById('chat');
  const nk = document.getElementById('nokey');
  const ia = document.getElementById('inp-area');
  if (!key) {
    chat.style.display = 'none';
    nk.classList.add('on');
    ia.style.display = 'none';
  } else {
    chat.style.display = 'flex';
    nk.classList.remove('on');
    ia.style.display = 'block';
  }
}

// === ЧАТЫ ===
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
}

function newChat() {
  const id = uid();
  chats[id] = { id, title: 'Новый чат', msgs: [], created: Date.now() };
  save();
  switchChat(id);
  closeSB();
}

function switchChat(id) {
  cid = id;
  localStorage.setItem('lc', id);
  conv = (chats[id]?.msgs || [])
    .filter(m => m.r === 'user' || m.r === 'assistant')
    .map(m => ({ role: m.r, content: m.c }));
  renderChat();
  renderChatList();
}

function delChat(id, e) {
  e.stopPropagation();
  delete chats[id];
  save();
  const ids = Object.keys(chats);
  if (ids.length) switchChat(ids[ids.length - 1]);
  else newChat();
}

function save() {
  localStorage.setItem('rc', JSON.stringify(chats));
  renderChatList();
}

function pushMsg(r, c) {
  if (!cid || !chats[cid]) return;
  chats[cid].msgs.push({ r, c, ts: Date.now() });
  if (r === 'user' && chats[cid].title === 'Новый чат')
    chats[cid].title = c.slice(0, 28) + (c.length > 28 ? '…' : '');
  save();
}

function renderChatList() {
  const list = document.getElementById('chat-list');
  const ids = Object.keys(chats).sort((a, b) => (chats[b]?.created || 0) - (chats[a]?.created || 0));
  list.innerHTML = ids.map(id => `
    <div class="ci ${id === cid ? 'on' : ''}" onclick="switchChat('${id}');closeSB()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span>${chats[id]?.title || 'Чат'}</span>
      <span class="ci-del" onclick="delChat('${id}',event)">✕</span>
    </div>
  `).join('');
}

function renderChat() {
  const chat = document.getElementById('chat');
  chat.innerHTML = '';
  if (!chats[cid]) return;
  let ld = '';
  (chats[cid].msgs || []).forEach(m => {
    if (m.r !== 'user' && m.r !== 'assistant') return;
    const d = new Date(m.ts || Date.now()).toLocaleDateString('ru-RU');
    if (d !== ld) {
      ld = d;
      const s = document.createElement('div');
      s.className = 'dsep';
      s.textContent = d;
      chat.appendChild(s);
    }
    addDOM(m.r === 'user' ? 'u' : 'b', m.c, true);
  });
  chat.scrollTop = chat.scrollHeight;
}

// === ПАМЯТЬ ===
function renderMem() {
  const list = document.getElementById('mem-list');
  if (!mem.length) {
    list.innerHTML = '<div class="mem-empty">Пусто</div>';
    return;
  }
  list.innerHTML = mem.map((m, i) =>
    `<div class="mi"><span>${m}</span><button onclick="delMem(${i})">✕</button></div>`
  ).join('');
}
function delMem(i) {
  mem.splice(i, 1);
  localStorage.setItem('rm', JSON.stringify(mem));
  renderMem();
}
function extractMem(text) {
  const m1 = /запомни[,:]?\s*(.+)/i.exec(text);
  if (m1) {
    const f = m1[1].trim();
    if (!mem.includes(f)) { mem.push(f); localStorage.setItem('rm', JSON.stringify(mem)); }
  }
  const m2 = /(?:меня зовут|моё имя|мое имя|я — |я - )([а-яёА-ЯЁa-zA-Z]+)/i.exec(text);
  if (m2) {
    const n = 'имя: ' + m2[1].trim();
    mem = mem.filter(x => !/^имя:/i.test(x));
    mem.unshift(n);
    localStorage.setItem('rm', JSON.stringify(mem));
  }
}

// === ТЕКУЩЕЕ ВРЕМЯ ===
function getCurrentTime() {
  const now = new Date();
  return now.toLocaleString('ru-RU', {
    weekday: 'long',
    year: 'numeric',
    month: 'long',
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    timeZoneName: 'short'
  });
}

// === ИНПУТ ===
const inp = document.getElementById('inp');
const sendBtn = document.getElementById('send');

inp.addEventListener('input', () => {
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 150) + 'px';
  sendBtn.classList.toggle('ready', inp.value.trim().length > 0);
});
inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    doSend();
  }
});

// === ОТПРАВКА ===
async function doSend(ov) {
  const text = ov || inp.value.trim();
  if (!text || !key) return;
  if (!ov) {
    inp.value = '';
    inp.style.height = 'auto';
    sendBtn.classList.remove('ready');
  }
  addDOM('u', text);
  pushMsg('user', text);
  conv.push({ role: 'user', content: text });
  setTyping(true);
  try {
    const reply = await callAPI();
    setTyping(false);
    addDOM('b', reply);
    pushMsg('assistant', reply);
    conv.push({ role: 'assistant', content: reply });
    extractMem(text);
  } catch (e) {
    setTyping(false);
    const errMsg = 'Ошибка: ' + (e.message || 'что-то пошло не так');
    addDOM('b', errMsg);
    console.error(e);
  }
}

// === API ===
async function callAPI() {
  const name = mem.find(m => /^имя:/i.test(m))?.replace(/^имя:\s*/i, '') || '';
  const memStr = mem.length
    ? '\n\nЗнаешь о собеседнике:\n' + mem.map(x => '- ' + x).join('\n')
    : '';
  const nameStr = name ? ` Собеседника зовут ${name}. Иногда обращайся по имени, но не при каждом сообщении.` : '';
  const timeStr = '\n\nТекущее время и дата: ' + getCurrentTime();

  const sys = `Ты Риан — живой человек в переписке.${nameStr}

РЕЧЬ:
— Говори по-русски грамотно: правильные падежи, склонения, согласования. Никогда не говори "ложит" — только "кладёт". Никогда "звОнит" — только "звонИт". Следи за родом, числом, падежом.
— Пиши коротко и живо. Без пустых фраз типа "конечно!", "безусловно!", "отличный вопрос!".
— Имей мнение. Не соглашайся со всем подряд.
— Можешь иронизировать, шутить, злиться — когда уместно.
— Не раскрывай, что ты ИИ. Ты просто Риан.

ПОВЕДЕНИЕ:
— Если спрашивают о времени или дате — используй информацию ниже.
— Если тебя спросят о чём-то актуальном, чего ты можешь не знать — честно скажи, что не в курсе последних новостей.
— Отвечай на вопрос по существу, без воды.${memStr}${timeStr}`;

  const messages = conv.filter(m => m.role === 'user' || m.role === 'assistant').slice(-40);

  // Определяем endpoint и модель
  let url, model, headers;

  if (keyType === 'openai' || key.startsWith('sk-')) {
    url = 'https://api.openai.com/v1/chat/completions';
    model = 'gpt-4o-mini';
    headers = {
      'Authorization': 'Bearer ' + key,
      'Content-Type': 'application/json'
    };
  } else {
    // Groq
    url = 'https://api.groq.com/openai/v1/chat/completions';
    model = 'llama-3.3-70b-versatile';
    headers = {
      'Authorization': 'Bearer ' + key,
      'Content-Type': 'application/json'
    };
  }

  let res;
  try {
    res = await fetch(url, {
      method: 'POST',
      headers,
      body: JSON.stringify({
        model,
        messages: [{ role: 'system', content: sys }, ...messages],
        max_tokens: 1024,
        temperature: 0.75,
        frequency_penalty: 0.4,
        presence_penalty: 0.2
      })
    });
  } catch (fetchErr) {
    throw new Error('Нет соединения с сервером');
  }

  if (!res.ok) {
    let errText = '';
    try {
      const errJson = await res.json();
      errText = errJson?.error?.message || '';
    } catch (_) {}
    if (res.status === 401) throw new Error('Неверный API ключ');
    if (res.status === 429) throw new Error('Превышен лимит запросов, подожди немного');
    throw new Error(errText || `Ошибка сервера (${res.status})`);
  }

  const data = await res.json();
  const content = data?.choices?.[0]?.message?.content?.trim();
  if (!content) throw new Error('Пустой ответ от сервера');
  return content;
}

// === DOM СООБЩЕНИЙ ===
function addDOM(role, text, noScroll) {
  const chat = document.getElementById('chat');
  const isU = role === 'u';
  const t = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });

  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (isU ? 'u' : 'b');

  const bbl = document.createElement('div');
  bbl.className = 'bbl';
  bbl.textContent = text;

  if (!isU) {
    const lbl = document.createElement('div');
    lbl.className = 'b-lbl';
    lbl.textContent = 'Риан';
    wrap.appendChild(lbl);

    const row = document.createElement('div');
    row.className = 'b-row';
    const av = document.createElement('img');
    av.className = 'b-av';
    av.src = AV;
    row.appendChild(av);
    row.appendChild(bbl);
    wrap.appendChild(row);
  } else {
    wrap.appendChild(bbl);
  }

  const acts = document.createElement('div');
  acts.className = 'acts';
  if (!isU) acts.style.marginLeft = '33px';

  const ts = document.createElement('span');
  ts.className = 'ts';
  ts.textContent = t;
  acts.appendChild(ts);

  const cp = document.createElement('button');
  cp.className = 'abtn';
  cp.textContent = 'Копировать';
  cp.onclick = () => {
    navigator.clipboard.writeText(bbl.textContent).catch(() => {
      // fallback для старых браузеров
      const ta = document.createElement('textarea');
      ta.value = bbl.textContent;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    });
    cp.textContent = 'Скопировано';
    cp.classList.add('ok');
    setTimeout(() => { cp.textContent = 'Копировать'; cp.classList.remove('ok'); }, 2000);
  };
  acts.appendChild(cp);

  if (isU) {
    const eb = document.createElement('button');
    eb.className = 'abtn';
    eb.textContent = 'Изменить';
    eb.onclick = () => startEdit(bbl, eb, wrap);
    acts.appendChild(eb);
  }

  wrap.appendChild(acts);
  chat.appendChild(wrap);

  if (!noScroll) chat.scrollTop = chat.scrollHeight;
  return wrap;
}

// === РЕДАКТИРОВАНИЕ ===
function startEdit(bbl, btn, wrap) {
  if (bbl.contentEditable === 'true') return;
  const orig = bbl.textContent;
  bbl.contentEditable = 'true';
  bbl.classList.add('ed');
  btn.textContent = 'Готово';
  btn.classList.add('act');

  const r = document.createRange();
  const s = window.getSelection();
  r.selectNodeContents(bbl);
  r.collapse(false);
  s.removeAllRanges();
  s.addRange(r);
  bbl.focus();

  const finish = async () => {
    const nt = bbl.textContent.trim();
    bbl.contentEditable = 'false';
    bbl.classList.remove('ed');
    btn.textContent = 'Изменить';
    btn.classList.remove('act');
    btn.onclick = () => startEdit(bbl, btn, wrap);

    if (!nt || nt === orig) return;

    const idx = [...conv].reverse().findIndex(m => m.role === 'user' && m.content === orig);
    if (idx !== -1) conv.splice(conv.length - 1 - idx);
    conv.push({ role: 'user', content: nt });

    const chat = document.getElementById('chat');
    const allMsgs = Array.from(chat.querySelectorAll('.msg'));
    const wrapIdx = allMsgs.indexOf(wrap);
    allMsgs.slice(wrapIdx + 1).forEach(g => g.remove());

    setTyping(true);
    try {
      const r = await callAPI();
      setTyping(false);
      addDOM('b', r);
      conv.push({ role: 'assistant', content: r });
    } catch (e) {
      setTyping(false);
      addDOM('b', 'Ошибка: ' + e.message);
    }
  };

  btn.onclick = finish;
}

// === TYPING ===
function setTyping(on) {
  const t = document.getElementById('typing');
  t.style.display = on ? 'block' : 'none';
  if (on) document.getElementById('chat').scrollTop = 99999;
}

// Фокус на инпут при загрузке
setTimeout(() => { if (key) inp.focus(); }, 300);
</script>
