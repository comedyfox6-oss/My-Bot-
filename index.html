<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Rian</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            color: #333;
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }
        .dark-theme {
            background-color: #333;
            color: #f0f0f0;
        }
        #chat {
            border: 1px solid #ccc;
            padding: 10px;
            max-height: 400px;
            overflow-y: auto;
            background-color: white;
        }
        .menu {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="menu">
        <button id="theme-toggle">Toggle Dark/Light Theme</button>
        <input type="text" id="api-key" placeholder="Enter API Key" />
    </div>
    <h1>Chatbot Rian</h1>
    <div id="chat"></div>
    <input type="text" id="user-input" placeholder="Type your message..." />
    <button id="send-button">Send</button>

    <script>
        let chatHistory = [];
        const chatDiv = document.getElementById('chat');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const apiKeyInput = document.getElementById('api-key');
        const themeToggle = document.getElementById('theme-toggle');

        // Function to send message
        function sendMessage() {
            const message = userInput.value;
            if (message) {
                chatHistory.push(`User: ${message}`);
                updateChat();
                userInput.value = '';
                // Here you would add code to send the message using the API key
            }
        }

        // Function to update the chat window
        function updateChat() {
            chatDiv.innerHTML = chatHistory.join('<br>');
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        sendButton.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        });

        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
        });
    </script>
</body>
</html>
