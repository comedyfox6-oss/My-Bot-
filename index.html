<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Риан</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
 --bg:#0d0d0f;
 --surface:#1a1a1f;
 --border:#2e2e38;
 --text:#f0f0f5;
 --muted:#8a8aa3;
 --accent:#3b82f6;
 --user:#2563eb;
}

{margin:0;padding:0;box-sizing:border-box}
body{
 background:var(--bg);
 color:var(--text);
 font-family:Inter,sans-serif;
 height:100vh;
 display:flex;
 flex-direction:column;
}

/ HEADER /
#header{
 display:flex;
 align-items:center;
 padding:12px;
 border-bottom:1px solid var(--border);
 font-weight:600;
}

/ CHAT /
#chat{
 flex:1;
 overflow-y:auto;
 padding:14px;
 display:flex;
 flex-direction:column;
 gap:10px;
}

/ MESSAGES /
.msg{
 max-width:80%;
 padding:10px 14px;
 border-radius:16px;
 line-height:1.4;
}

.user{
 align-self:flex-end;
 background:var(--user);
 color:#fff;
}

.bot{
 align-self:flex-start;
 background:#1e1e26;
 border:1px solid var(--border);
}

/ INPUT /
#input-area{
 display:flex;
 padding:10px;
 border-top:1px solid var(--border);
 gap:8px;
}

#input{
 flex:1;
 background:#222;
 border:none;
 border-radius:12px;
 padding:10px;
 color:#fff;
 resize:none;
 outline:none;
}

#send{
 background:var(--accent);
 border:none;
 color:#fff;
 border-radius:10px;
 padding:10px 14px;
 cursor:pointer;
}

/ SIDEBAR /
#sidebar{
 position:fixed;
 left:-260px;
 top:0;
 width:260px;
 height:100%;
 background:#111;
 border-right:1px solid var(--border);
 transition:.2s;
 padding:10px;
}

#sidebar.open{left:0}

.chat-item{
 padding:8px;
 cursor:pointer;
 display:flex;
 justify-content:space-between;
}

.chat-item:hover{
 background:#222;
}

.del{
 color:#ef4444;
 cursor:pointer;
}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="header">
 <button onclick="toggleSidebar()">☰</button>
 <div style="margin-left:10px">Риан</div>
</div>

<div id="chat"></div>

<div id="input-area">
 <textarea id="input" placeholder="Сообщение..."></textarea>
 <button id="send" onclick="send()">➤</button>
</div>

<script>
let messages = [];
let chats = [];
let currentChat = null;

/ ---------- UI ---------- /

function addMessageUI(role, text){
 const div = document.createElement("div");
 div.className = "msg " + (role === "user" ? "user" : "bot");
 div.textContent = text;
 chat.appendChild(div);
 chat.scrollTop = chat.scrollHeight;
}

/ ---------- LOGIC ---------- /

function addMessage(role, content){
 if(!["user","assistant","system"].includes(role)) return;
 messages.push({role, content});
}

async function send(){
 const input = document.getElementById("input");
 const text = input.value.trim();
 if(!text) return;

 input.value = "";

 addMessage("user", text);
 addMessageUI("user", text);

 const reply = await sendToAI();

 addMessageUI("assistant", reply);
}

async function sendToAI(){
 const key = localStorage.getItem("groq_api");

 const res = await fetch("https://api.groq.com/openai/v1/chat/completions",{
  method:"POST",
  headers:{
   "Content-Type":"application/json",
   "Authorization":"Bearer " + key
  },
  body:JSON.stringify({
   model:"llama-3.1-8b-instant",
   messages:messages
  })
 });

 const data = await res.json();
 const msg = data.choices?.[0]?.message?.content || "Ошибка";

 addMessage("assistant", msg);

 return msg;
}

/ ---------- SIDEBAR ---------- /

function toggleSidebar(){
 sidebar.classList.toggle("open");
}

function newChat(){
 messages = [];
 currentChat = Date.now();
 chats.push({id:currentChat});
 renderChats();
 chat.innerHTML = "";
}

function deleteChat(id){
 chats = chats.filter(c=>c.id!==id);
 renderChats();
}

function renderChats(){
 sidebar.innerHTML = "";

 chats.forEach(c=>{
  const div = document.createElement("div");
  div.className = "chat-item";
  div.innerHTML =    <span onclick="loadChat(${c.id})">Чат</span>    <span class="del" onclick="deleteChat(${c.id})">✖</span>  ;
  sidebar.appendChild(div);
 });
}

function loadChat(id){
 currentChat = id;
 chat.innerHTML = "";
}

/ ---------- INIT ---------- */

newChat();
</script>

</body>
</html>
