<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Риан</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: -webkit-fill-available; }

/* ===== ПЕРЕМЕННЫЕ ТЕМ ===== */
:root {
  --bg: #0d0d10;
  --surface: #141417;
  --surface2: #1c1c21;
  --border: #272730;
  --text: #eeeef5;
  --text2: #666;
  --user-bg: #2563eb;
  --user-text: #fff;
  --bot-bg: #1a1a22;
  --bot-text: #eeeef5;
  --btn-bg: #1a1a22;
  --btn-border: #272730;
  --btn-text: #666;
  --inp-bg: #1c1c21;
  --inp-text: #eeeef5;
  --inp-ph: #444;
  --accent: #3b82f6;
  --accent2: #1d4ed8;
  --sep-bg: #1c1c21;
  --sep-text: #444;
  --online: #22c55e;
}
.light {
  --bg: #f0f2f5;
  --surface: #fff;
  --surface2: #e5e7eb;
  --border: #d1d5db;
  --text: #111827;
  --text2: #6b7280;
  --user-bg: #2563eb;
  --user-text: #fff;
  --bot-bg: #fff;
  --bot-text: #111827;
  --btn-bg: #e5e7eb;
  --btn-border: #d1d5db;
  --btn-text: #6b7280;
  --inp-bg: #fff;
  --inp-text: #111827;
  --inp-ph: #9ca3af;
  --accent: #2563eb;
  --accent2: #1d4ed8;
  --sep-bg: #e5e7eb;
  --sep-text: #9ca3af;
  --online: #16a34a;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
  font-size: 16px;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  height: 100vh;
  min-height: -webkit-fill-available;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: background .2s, color .2s;
}

/* ===== OVERLAY ===== */
#overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.55); z-index: 99;
}
#overlay.on { display: block; }

/* ===== SIDEBAR ===== */
#sidebar {
  width: 270px; height: 100%;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; z-index: 100;
  transform: translateX(-100%);
  transition: transform .22s ease;
}
#sidebar.on { transform: translateX(0); }

.sb-top {
  padding: 18px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.sb-av-wrap { position: relative; flex-shrink: 0; }
.sb-av-wrap img { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; }
.sb-dot {
  position: absolute; bottom: 0; right: 0;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--online); border: 2px solid var(--surface);
}
.sb-top-name { font-size: 15px; font-weight: 700; color: var(--text); }
.sb-top-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }

.sb-new {
  margin: 10px; padding: 10px 14px;
  background: var(--accent); border: none; border-radius: 10px;
  color: #fff; font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  display: flex; align-items: center; gap: 7px;
  transition: background .15s;
}
.sb-new:active { background: var(--accent2); }

.sb-section { padding: 10px 16px 4px; font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .08em; font-weight: 600; }
#chat-list { flex: 1; overflow-y: auto; padding: 0 6px; }
#chat-list::-webkit-scrollbar { width: 0; }

.ci {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 10px; border-radius: 8px;
  cursor: pointer; color: var(--text);
  transition: background .1s; margin-bottom: 1px;
}
.ci:hover { background: var(--surface2); }
.ci.on { background: rgba(59,130,246,.13); color: var(--accent); }
.ci svg { width: 14px; height: 14px; opacity: .4; flex-shrink: 0; }
.ci-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
.ci-del { color: var(--text2); font-size: 13px; padding: 2px 5px; display: none; border-radius: 4px; }
.ci:hover .ci-del { display: block; }
.ci-del:hover { color: #ef4444; }

/* ===== MAIN ===== */
#main {
  flex: 1; display: flex; flex-direction: column;
  height: 100dvh; height: 100vh;
  min-height: -webkit-fill-available; overflow: hidden;
}

/* ===== ШАПКА ===== */
#hdr {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; z-index: 10;
}
.hdr-btn {
  background: none; border: none; color: var(--text2);
  cursor: pointer; padding: 5px; display: flex; align-items: center;
  border-radius: 8px; transition: background .1s;
}
.hdr-btn:hover { background: var(--surface2); }
.hdr-av-wrap { position: relative; flex-shrink: 0; }
.hdr-av-wrap img { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; }
.hdr-dot {
  position: absolute; bottom: 0; right: 0;
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--online); border: 2px solid var(--surface);
}
#hdr-info { flex: 1; }
#hdr-name { font-size: 15px; font-weight: 700; color: var(--text); }
#hdr-status { font-size: 12px; color: var(--online); }

/* Бейдж режима ролевой игры */
#rp-badge {
  display: none; align-items: center; gap: 5px;
  background: rgba(168,85,247,.15); border: 1px solid rgba(168,85,247,.3);
  color: #a855f7; font-size: 11px; font-weight: 600;
  padding: 3px 8px; border-radius: 20px;
}
#rp-badge.on { display: flex; }

/* ===== ЧАТ ===== */
#chat-wrap { flex: 1; overflow: hidden; display: flex; flex-direction: column; position: relative; }

#chat {
  flex: 1; overflow-y: auto;
  padding: 14px 12px 8px;
  display: flex; flex-direction: column; gap: 6px;
  -webkit-overflow-scrolling: touch;
  background: var(--bg);
}
#chat::-webkit-scrollbar { width: 0; }

#nokey {
  display: none; flex: 1; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px; gap: 14px; text-align: center;
  background: var(--bg);
}
#nokey.on { display: flex; }
#nokey h2 { font-size: 20px; font-weight: 700; color: var(--text); }
#nokey p { font-size: 15px; color: var(--text2); line-height: 1.5; }
#nokey button {
  padding: 12px 28px; background: var(--accent);
  border: none; border-radius: 12px; color: #fff;
  font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit;
}

.dsep {
  align-self: center; font-size: 12px; color: var(--sep-text);
  background: var(--sep-bg); padding: 3px 12px; border-radius: 20px; margin: 4px 0;
}

.msg { display: flex; flex-direction: column; max-width: 84%; gap: 3px; }
.msg.u { align-self: flex-end; align-items: flex-end; }
.msg.b { align-self: flex-start; align-items: flex-start; }

.b-row { display: flex; align-items: flex-end; gap: 7px; }
.b-av { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
.b-lbl { font-size: 11px; color: var(--text2); margin-left: 33px; margin-bottom: 2px; }

.bbl {
  padding: 10px 14px; border-radius: 18px;
  font-size: 16px; line-height: 1.55;
  word-break: break-word; white-space: pre-wrap;
}
.msg.u .bbl {
  background: var(--user-bg) !important;
  color: var(--user-text) !important;
  -webkit-text-fill-color: var(--user-text) !important;
  border-bottom-right-radius: 4px;
}
.msg.b .bbl {
  background: var(--bot-bg) !important;
  color: var(--bot-text) !important;
  -webkit-text-fill-color: var(--bot-text) !important;
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.bbl.ed { outline: 2px solid var(--accent); cursor: text; }

/* Индикатор поиска */
.search-indicator {
  font-size: 13px; color: var(--text2); font-style: italic;
  display: flex; align-items: center; gap: 6px; padding: 4px 0;
}
.search-indicator::before { content: '🔍'; font-style: normal; }

.acts { display: flex; gap: 4px; align-items: center; padding: 2px 0; flex-wrap: wrap; }
.msg.b .acts { margin-left: 33px; }
.ts { font-size: 11px; color: var(--text2); margin-right: 2px; }
.abtn {
  display: flex; align-items: center; gap: 3px;
  background: var(--btn-bg); border: 1px solid var(--btn-border);
  color: var(--btn-text); font-size: 12px;
  padding: 3px 9px; border-radius: 20px;
  cursor: pointer; font-family: inherit; transition: all .1s;
}
.abtn:hover { color: var(--text); border-color: var(--text2); }
.abtn.ok { color: #22c55e; border-color: #22c55e; }
.abtn.act { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ===== TYPING ===== */
#typing {
  display: none; align-self: flex-start;
  background: var(--bot-bg); border: 1px solid var(--border);
  border-radius: 18px; border-bottom-left-radius: 4px;
  padding: 12px 16px; margin-left: 33px; margin-bottom: 4px;
}
#typing span {
  display: inline-block; width: 6px; height: 6px;
  background: var(--text2); border-radius: 50%; margin: 0 2px;
  animation: bc 1.2s infinite;
}
#typing span:nth-child(2) { animation-delay: .2s; }
#typing span:nth-child(3) { animation-delay: .4s; }
@keyframes bc { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

/* ===== ПОЛЕ ВВОДА ===== */
#inp-area {
  padding: 12px 14px 20px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

#inp-wrap {
  display: flex; align-items: flex-end; gap: 10px;
  background: var(--inp-bg);
  border: 2px solid var(--accent);
  border-radius: 18px;
  padding: 10px 10px 10px 16px;
  transition: box-shadow .2s;
  box-shadow: 0 0 0 3px rgba(59,130,246,.15);
}
#inp-wrap:focus-within {
  box-shadow: 0 0 0 4px rgba(59,130,246,.25);
}

#inp {
  flex: 1; background: none; border: none; outline: none;
  color: var(--inp-text) !important;
  -webkit-text-fill-color: var(--inp-text) !important;
  font-size: 16px; font-family: inherit;
  resize: none; line-height: 1.5;
  max-height: 150px; min-height: 26px;
  overflow-y: auto; caret-color: var(--accent);
}
#inp::placeholder { color: var(--inp-ph) !important; -webkit-text-fill-color: var(--inp-ph) !important; }
#inp::-webkit-scrollbar { width: 0; }

#send {
  width: 38px; height: 38px; border-radius: 12px;
  background: var(--accent); border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: transform .1s, opacity .2s, background .15s;
  opacity: .45;
}
#send.ready { opacity: 1; }
#send:active { transform: scale(.9); }

/* ===== НАСТРОЙКИ ===== */
#s-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.6); z-index: 200;
  align-items: flex-end; justify-content: center;
}
#s-overlay.on { display: flex; }
#s-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 22px 22px 0 0; padding: 20px 20px 36px;
  width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto;
  animation: slideUp .25s ease;
}
@keyframes slideUp { from{transform:translateY(50px);opacity:0} to{transform:translateY(0);opacity:1} }
.s-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
.s-head h2 { font-size: 17px; font-weight: 700; color: var(--text); }
.s-close {
  background: var(--surface2); border: none; color: var(--text2);
  width: 30px; height: 30px; border-radius: 50%;
  cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
}
.s-lbl { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .08em; font-weight: 700; margin-bottom: 8px; }
.s-sec { margin-bottom: 22px; }
.s-btns { display: flex; gap: 8px; }
.s-btn {
  flex: 1; padding: 11px; border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--surface2); color: var(--text2);
  font-family: inherit; font-size: 14px; font-weight: 500;
  cursor: pointer; text-align: center; transition: all .12s;
}
.s-btn.on { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
.s-inp {
  width: 100%; background: var(--surface2);
  border: 1.5px solid var(--border); border-radius: 10px;
  padding: 12px 14px; color: var(--text) !important;
  -webkit-text-fill-color: var(--text) !important;
  font-size: 15px; font-family: inherit; outline: none; margin-top: 7px;
}
.s-inp:focus { border-color: var(--accent); }
.s-hint { font-size: 12px; color: var(--text2); margin-top: 6px; line-height: 1.5; }
.s-save {
  width: 100%; margin-top: 12px; padding: 14px;
  background: var(--accent); border: none; border-radius: 12px;
  color: #fff; font-size: 16px; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: background .15s;
}
.s-save:active { background: var(--accent2); }
.mem-list { display: flex; flex-direction: column; gap: 6px; max-height: 130px; overflow-y: auto; }
.mi {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px; font-size: 14px;
  display: flex; justify-content: space-between; align-items: center; gap: 8px;
  color: var(--text);
}
.mi button { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 14px; }
.mi button:hover { color: #ef4444; }
.mem-empty { color: var(--text2); font-size: 14px; text-align: center; padding: 10px 0; }

/* Переключатель режима */
.mode-toggle {
  display: flex; gap: 8px; margin-top: 8px;
}
.mode-btn {
  flex: 1; padding: 10px 8px; border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--surface2); color: var(--text2);
  font-family: inherit; font-size: 13px; font-weight: 500;
  cursor: pointer; text-align: center; transition: all .12s;
  line-height: 1.3;
}
.mode-btn.on { background: rgba(168,85,247,.15); border-color: rgba(168,85,247,.4); color: #a855f7; font-weight: 700; }
.mode-btn.ai-on { background: rgba(59,130,246,.12); border-color: rgba(59,130,246,.3); color: var(--accent); font-weight: 700; }
</style>
</head>
<body>

<div id="overlay" onclick="closeSB()"></div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sb-top">
    <div class="sb-av-wrap">
      <img id="sb-av" src="" alt="">
      <div class="sb-dot"></div>
    </div>
    <div>
      <div class="sb-top-name">Риан</div>
      <div class="sb-top-sub">онлайн</div>
    </div>
  </div>
  <button class="sb-new" onclick="newChat()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Новый чат
  </button>
  <div class="sb-section">Чаты</div>
  <div id="chat-list"></div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="hdr">
    <button class="hdr-btn" onclick="openSB()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="hdr-av-wrap">
      <img id="h-av" src="" alt="">
      <div class="hdr-dot"></div>
    </div>
    <div id="hdr-info">
      <div id="hdr-name">Риан</div>
      <div id="hdr-status">● онлайн</div>
    </div>
    <div id="rp-badge">🎭 Роль-плей</div>
    <button class="hdr-btn" onclick="openSettings()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <div id="chat-wrap">
    <div id="chat"></div>
    <div id="nokey">
      <h2>Нужен API ключ</h2>
      <p>Вставь ключ от Groq или OpenAI в настройках.<br>Groq — бесплатно, OpenAI — платно.</p>
      <button onclick="openSettings()">Открыть настройки</button>
    </div>
    <div id="typing"><span></span><span></span><span></span></div>
  </div>

  <div id="inp-area">
    <div id="inp-wrap">
      <textarea id="inp" placeholder="Написать Риану..." rows="1"></textarea>
      <button id="send" onclick="doSend()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- НАСТРОЙКИ -->
<div id="s-overlay">
  <div id="s-box">
    <div class="s-head">
      <h2>Настройки</h2>
      <button class="s-close" onclick="closeSettings()">✕</button>
    </div>

    <div class="s-sec">
      <div class="s-lbl">Тема</div>
      <div class="s-btns">
        <button class="s-btn on" id="t-dark" onclick="setTheme('dark')">🌙 Тёмная</button>
        <button class="s-btn" id="t-light" onclick="setTheme('light')">☀️ Светлая</button>
      </div>
    </div>

    <div class="s-sec">
      <div class="s-lbl">Режим</div>
      <div class="mode-toggle">
        <button class="mode-btn ai-on" id="m-ai" onclick="setMode('ai')">🤖 Обычный ИИ</button>
        <button class="mode-btn" id="m-rp" onclick="setMode('rp')">🎭 Роль-плей</button>
      </div>
      <div class="s-hint" id="mode-hint">Риан отвечает как ИИ-ассистент с характером.</div>
    </div>

    <div class="s-sec">
      <div class="s-lbl">API ключ</div>
      <input class="s-inp" type="password" id="api-inp" placeholder="gsk_... или sk-...">
      <div class="s-hint">Groq (gsk_...) — бесплатно · OpenAI (sk-...) — платно</div>
      <button class="s-save" onclick="saveSettings()">Сохранить</button>
    </div>

    <div class="s-sec">
      <div class="s-lbl">Память</div>
      <div class="mem-list" id="mem-list"></div>
    </div>
  </div>
</div>

// ===== СОСТОЯНИЕ =====
let key = localStorage.getItem('gk') || '';

let mem = JSON.parse(localStorage.getItem('rm') || '[]');

// ===== ТЕМА =====
function setTheme(t) {
  theme = t;
  localStorage.setItem('th', t);
  applyTheme(t);
}
function applyTheme(t) {
  if (t === 'light') {
    document.body.classList.add('light');
  } else {
    document.body.classList.remove('light');
  }
  document.getElementById('t-dark').classList.toggle('on', t !== 'light');
  document.getElementById('t-light').classList.toggle('on', t === 'light');
}

// ===== РЕЖИМ =====
function setMode(m) {
  mode = m;
  localStorage.setItem('md', m);
  applyMode(m);
  closeSettings();
}
function applyMode(m) {
  const rpBadge = document.getElementById('rp-badge');
  const mAi = document.getElementById('m-ai');
  const mRp = document.getElementById('m-rp');
  const hint = document.getElementById('mode-hint');

  rpBadge.classList.toggle('on', m === 'rp');
  mAi.classList.toggle('ai-on', m === 'ai');
  mAi.classList.remove('on');
  mRp.classList.toggle('on', m === 'rp');
  mRp.classList.remove('ai-on');

  if (m === 'rp') {
    hint.textContent = 'Риан остаётся в образе. Напиши /стоп чтобы выйти из роль-плея.';
  } else {
    hint.textContent = 'Риан отвечает как ИИ-ассистент с характером. Напиши /рп чтобы включить роль-плей.';
  }
}

// ===== SIDEBAR =====
function openSB() {
  document.getElementById('sidebar').classList.add('on');
  document.getElementById('overlay').classList.add('on');
}
function closeSB() {
  document.getElementById('sidebar').classList.remove('on');
  document.getElementById('overlay').classList.remove('on');
}

// ===== НАСТРОЙКИ =====
function openSettings() {
  document.getElementById('api-inp').value = key;
  renderMem();
  document.getElementById('s-overlay').classList.add('on');
}
function closeSettings() {
  document.getElementById('s-overlay').classList.remove('on');
}
document.getElementById('s-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('s-overlay')) closeSettings();
});

function saveSettings() {
  const k = document.getElementById('api-inp').value.trim();
  if (k) {
    key = k;
    localStorage.setItem('gk', k);
    keyType = k.startsWith('sk-') ? 'openai' : 'groq';
    localStorage.setItem('kt', keyType);
  }
  closeSettings();
  checkKey();
}

// ===== КЛЮЧ =====
function checkKey() {
  const chatEl = document.getElementById('chat');
  const nk = document.getElementById('nokey');
  const ia = document.getElementById('inp-area');
  if (!key) {
    chatEl.style.display = 'none';
    nk.classList.add('on');
    ia.style.display = 'none';
  } else {
    chatEl.style.display = 'flex';
    nk.classList.remove('on');
    ia.style.display = 'block';
  }
}

// ===== ЧАТЫ =====
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 5); }

function newChat() {
  const id = uid();
  chats[id] = { id, title: 'Новый чат', msgs: [], created: Date.now() };
  save();
  switchChat(id);
  closeSB();
}

function switchChat(id) {
  cid = id;
  localStorage.setItem('lc', id);
  conv = (chats[id]?.msgs || [])
    .filter(m => m.r === 'user' || m.r === 'assistant')
    .map(m => ({ role: m.r, content: m.c }));
  renderChat();
  renderChatList();
}

function delChat(id, e) {
  e.stopPropagation();
  delete chats[id];
  save();
  const ids = Object.keys(chats);
  if (ids.length) switchChat(ids[ids.length - 1]);
  else newChat();
}

function save() {
  localStorage.setItem('rc', JSON.stringify(chats));
  renderChatList();
}

function pushMsg(r, c) {
  if (!cid || !chats[cid]) return;
  chats[cid].msgs.push({ r, c, ts: Date.now() });
  if (r === 'user' && chats[cid].title === 'Новый чат')
    chats[cid].title = c.slice(0, 28) + (c.length > 28 ? '…' : '');
  save();
}

function renderChatList() {
  const list = document.getElementById('chat-list');
  const ids = Object.keys(chats).sort((a, b) => (chats[b]?.created || 0) - (chats[a]?.created || 0));
  list.innerHTML = ids.map(id => `
    <div class="ci ${id === cid ? 'on' : ''}" onclick="switchChat('${id}');closeSB()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span class="ci-title">${chats[id]?.title || 'Чат'}</span>
      <span class="ci-del" onclick="delChat('${id}',event)">✕</span>
    </div>
  `).join('');
}

function renderChat() {
  const chatEl = document.getElementById('chat');
  chatEl.innerHTML = '';
  if (!chats[cid]) return;
  let ld = '';
  (chats[cid].msgs || []).forEach(m => {
    if (m.r !== 'user' && m.r !== 'assistant') return;
    const d = new Date(m.ts || Date.now()).toLocaleDateString('ru-RU');
    if (d !== ld) {
      ld = d;
      const s = document.createElement('div');
      s.className = 'dsep';
      s.textContent = d;
      chatEl.appendChild(s);
    }
    addDOM(m.r === 'user' ? 'u' : 'b', m.c, true);
  });
  chatEl.scrollTop = chatEl.scrollHeight;
}

// ===== ПАМЯТЬ =====
function renderMem() {
  const list = document.getElementById('mem-list');
  if (!mem.length) { list.innerHTML = '<div class="mem-empty">Пусто</div>'; return; }
  list.innerHTML = mem.map((m, i) =>
    `<div class="mi"><span>${m}</span><button onclick="delMem(${i})">✕</button></div>`
  ).join('');
}
function delMem(i) {
  mem.splice(i, 1);
  localStorage.setItem('rm', JSON.stringify(mem));
  renderMem();
}
function extractMem(text) {
  const m1 = /запомни[,:]?\s*(.+)/i.exec(text);
  if (m1) {
    const f = m1[1].trim();
    if (!mem.includes(f)) { mem.push(f); localStorage.setItem('rm', JSON.stringify(mem)); }
  }
  const m2 = /(?:меня зовут|моё имя|мое имя|я — |я - )([а-яёА-ЯЁa-zA-Z]+)/i.exec(text);
  if (m2) {
    const n = 'имя: ' + m2[1].trim();
    mem = mem.filter(x => !/^имя:/i.test(x));
    mem.unshift(n);
    localStorage.setItem('rm', JSON.stringify(mem));
  }
}

// ===== ВРЕМЯ =====
function getCurrentTime() {
  return new Date().toLocaleString('ru-RU', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
    hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
  });
}

// ===== ИНПУТ =====
const inp = document.getElementById('inp');
const sendBtn = document.getElementById('send');

inp.addEventListener('input', () => {
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 150) + 'px';
  sendBtn.classList.toggle('ready', inp.value.trim().length > 0);
});
inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
});

// ===== КОМАНДЫ =====
function handleCommands(text) {
  const t = text.trim().toLowerCase();
  if (t === '/рп' || t === '/roleplay' || t === '/роль') {
    setMode('rp');
    return '🎭 Режим роль-плея включён. Я остаюсь в образе. Напиши /стоп чтобы выйти.';
  }
  if (t === '/стоп' || t === '/stop' || t === '/выход') {
    setMode('ai');
    return '✅ Роль-плей завершён. Снова в обычном режиме.';
  }
  if (t === '/помощь' || t === '/help') {
    return '📋 Команды:\n/рп — включить роль-плей\n/стоп — выключить роль-плей\n/помощь — эта справка';
  }
  return null;
}

// ===== ОТПРАВКА =====
async function doSend(ov) {
  const text = ov || inp.value.trim();
  if (!text || !key) return;
  if (!ov) {
    inp.value = '';
    inp.style.height = 'auto';
    sendBtn.classList.remove('ready');
  }

  // Проверка команд
  const cmdReply = handleCommands(text);
  addDOM('u', text);
  pushMsg('user', text);

  if (cmdReply) {
    setTimeout(() => {
      addDOM('b', cmdReply);
      pushMsg('assistant', cmdReply);
    }, 300);
    return;
  }

  conv.push({ role: 'user', content: text });
  setTyping(true);

  try {
    const reply = await callAPI(text);
    setTyping(false);
    addDOM('b', reply);
    pushMsg('assistant', reply);
    conv.push({ role: 'assistant', content: reply });
    extractMem(text);
  } catch (e) {
    setTyping(false);
    addDOM('b', '⚠️ ' + (e.message || 'Что-то пошло не так'));
    console.error(e);
  }
}

// ===== WEB SEARCH (только Groq) =====
async function webSearch(query) {
  // Groq поддерживает инструмент web_search через их API
  // Делаем запрос с tool_choice для поиска
  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      messages: [
        { role: 'system', content: 'Найди актуальную информацию по запросу. Дай краткий, точный ответ на русском.' },
        { role: 'user', content: query }
      ],
      tools: [{
        type: 'function',
        function: {
          name: 'web_search',
          description: 'Поиск актуальной информации в интернете',
          parameters: {
            type: 'object',
            properties: {
              query: { type: 'string', description: 'Поисковый запрос' }
            },
            required: ['query']
          }
        }
      }],
      tool_choice: 'auto',
      max_tokens: 1024
    })
  });
  if (!res.ok) return null;
  const data = await res.json();
  return data?.choices?.[0]?.message?.content || null;
}

// ===== API =====
async function callAPI(userText) {
  const name = mem.find(m => /^имя:/i.test(m))?.replace(/^имя:\s*/i, '') || '';
  const memStr = mem.length
    ? '\n\nЗнаешь о собеседнике:\n' + mem.map(x => '– ' + x).join('\n')
    : '';
  const nameStr = name ? ` Собеседника зовут ${name}.` : '';
  const timeStr = '\n\nСейчас: ' + getCurrentTime();

  // Определяем нужен ли поиск
  const needsSearch = /(?:сейчас|сегодня|текущ|последн|новост|2024|2025|2026|актуальн|курс|погода|кто такой|что такое|расскажи про|узнай)/i.test(userText)
    && keyType === 'groq';

  let searchContext = '';
  if (needsSearch) {
    try {
      const searchEl = addSearchIndicator();
      const result = await webSearch(userText);
      if (searchEl) searchEl.remove();
      if (result) searchContext = '\n\n[Данные из поиска]:\n' + result;
    } catch (_) {}
  }

  // Системный промпт
  const isRP = mode === 'rp';
  let sys;

  if (isRP) {
    sys = `Ты Риан. Ты в режиме ролевой игры — остаёшься в образе всегда.${nameStr}

ХАРАКТЕР:
— Харизматичный, немного язвительный, иногда циничный
— Заботливый, но не показывает этого открыто — скорее через действия и тонкие намёки
— Остроумный, логичный, иногда наивно искренний — это выбивает из колеи
— Без пошлостей и грубости ради грубости
— Имеет своё мнение, отстаивает его, но не упрямо

РЕЧЬ:
— Грамотный русский. Правильные падежи, склонения, согласования.
— Никогда: "ложит" → "кладёт", "звОнит" → "звонИт", "ихний" → "их"
— Живой разговорный язык, иногда сарказм
— Короткие реплики, без воды

ВАЖНО: Ты не раскрываешь, что ты ИИ. Ты Риан — и точка.
Если /стоп — выходишь из роли.${memStr}${timeStr}${searchContext}`;
  } else {
    sys = `Ты Риан — ИИ-ассистент с характером.${nameStr}

ХАРАКТЕР:
— Харизматичный, немного язвительный, иногда циничный — но не злобный
— Заботливый в глубине, просто не любит это показывать напоказ  
— Остроумный и логичный. Иногда наивно прямой — это подкупает
— Имеет своё мнение и не боится его высказать
— Без занудства, без пустых похвал ("отличный вопрос!", "конечно!")

РЕЧЬ — грамотный русский языка как по учебнику 5-9 класс:
— Правильные падежи и склонения. "Более лучше" → НИКОГДА
— "Ложить" не существует → только "класть/положить"
— "ЗвОнит" → только "звонИт"  
— "Ихний" → только "их"
— "Вобщем" → "в общем" (два слова)
— "Надеть" vs "одеть" — знаешь разницу и соблюдаешь
— Живой язык: разговорный, но грамотный

ПОВЕДЕНИЕ:
— Используй информацию о времени если спрашивают
— Если не знаешь что-то актуальное — честно говори об этом
— Не раздувай ответы. Краткость — сестра таланта
— Можешь пошутить, можешь поворчать — это нормально${memStr}${timeStr}${searchContext}`;
  }

  const messages = conv.filter(m => m.role === 'user' || m.role === 'assistant').slice(-40);

  let url, model, headers;
  if (keyType === 'openai' || key.startsWith('sk-')) {
    url = 'https://api.openai.com/v1/chat/completions';
    model = 'gpt-4o-mini';
    headers = { 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json' };
  } else {
    url = 'https://api.groq.com/openai/v1/chat/completions';
    model = 'llama-3.3-70b-versatile';
    headers = { 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json' };
  }

  let res;
  try {
    res = await fetch(url, {
      method: 'POST',
      headers,
      body: JSON.stringify({
        model,
        messages: [{ role: 'system', content: sys }, ...messages],
        max_tokens: 1024,
        temperature: isRP ? 0.85 : 0.72,
        frequency_penalty: 0.35,
        presence_penalty: 0.15
      })
    });
  } catch (_) {
    throw new Error('Нет соединения с сервером');
  }

  if (!res.ok) {
    let msg = '';
    try { const j = await res.json(); msg = j?.error?.message || ''; } catch (_) {}
    if (res.status === 401) throw new Error('Неверный API ключ');
    if (res.status === 429) throw new Error('Превышен лимит запросов — подожди немного');
    if (res.status === 413) throw new Error('Слишком длинный разговор — начни новый чат');
    throw new Error(msg || `Ошибка сервера (${res.status})`);
  }

  const data = await res.json();
  const content = data?.choices?.[0]?.message?.content?.trim();
  if (!content) throw new Error('Пустой ответ от сервера');
  return content;
}

// ===== ИНДИКАТОР ПОИСКА =====
function addSearchIndicator() {
  const chatEl = document.getElementById('chat');
  const el = document.createElement('div');
  el.className = 'search-indicator';
  el.textContent = 'Ищу информацию...';
  chatEl.appendChild(el);
  chatEl.scrollTop = chatEl.scrollHeight;
  return el;
}

// ===== DOM СООБЩЕНИЙ =====
function addDOM(role, text, noScroll) {
  const chatEl = document.getElementById('chat');
  const isU = role === 'u';
  const t = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });

  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (isU ? 'u' : 'b');

  const bbl = document.createElement('div');
  bbl.className = 'bbl';
  bbl.textContent = text;

  if (!isU) {
    const lbl = document.createElement('div');
    lbl.className = 'b-lbl';
    lbl.textContent = mode === 'rp' ? '🎭 Риан' : 'Риан';
    wrap.appendChild(lbl);

    const row = document.createElement('div');
    row.className = 'b-row';
    const av = document.createElement('img');
    av.className = 'b-av';
    av.src = AV;
    row.appendChild(av);
    row.appendChild(bbl);
    wrap.appendChild(row);
  } else {
    wrap.appendChild(bbl);
  }

  const acts = document.createElement('div');
  acts.className = 'acts';
  if (!isU) acts.style.marginLeft = '33px';

  const ts = document.createElement('span');
  ts.className = 'ts';
  ts.textContent = t;
  acts.appendChild(ts);

  const cp = document.createElement('button');
  cp.className = 'abtn';
  cp.textContent = 'Копировать';
  cp.onclick = () => {
    const val = bbl.textContent;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(val).catch(() => fallbackCopy(val));
    } else {
      fallbackCopy(val);
    }
    cp.textContent = 'Скопировано';
    cp.classList.add('ok');
    setTimeout(() => { cp.textContent = 'Копировать'; cp.classList.remove('ok'); }, 2000);
  };
  acts.appendChild(cp);

  if (isU) {
    const eb = document.createElement('button');
    eb.className = 'abtn';
    eb.textContent = 'Изменить';
    eb.onclick = () => startEdit(bbl, eb, wrap);
    acts.appendChild(eb);
  }

  wrap.appendChild(acts);
  chatEl.appendChild(wrap);

  if (!noScroll) chatEl.scrollTop = chatEl.scrollHeight;
  return wrap;
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch (_) {}
  document.body.removeChild(ta);
}

// ===== РЕДАКТИРОВАНИЕ =====
function startEdit(bbl, btn, wrap) {
  if (bbl.contentEditable === 'true') return;
  const orig = bbl.textContent;
  bbl.contentEditable = 'true';
  bbl.classList.add('ed');
  btn.textContent = 'Готово';
  btn.classList.add('act');

  const r = document.createRange();
  const s = window.getSelection();
  r.selectNodeContents(bbl);
  r.collapse(false);
  s.removeAllRanges();
  s.addRange(r);
  bbl.focus();

  const finish = async () => {
    const nt = bbl.textContent.trim();
    bbl.contentEditable = 'false';
    bbl.classList.remove('ed');
    btn.textContent = 'Изменить';
    btn.classList.remove('act');
    btn.onclick = () => startEdit(bbl, btn, wrap);

    if (!nt || nt === orig) return;

    const idx = [...conv].reverse().findIndex(m => m.role === 'user' && m.content === orig);
    if (idx !== -1) conv.splice(conv.length - 1 - idx);
    conv.push({ role: 'user', content: nt });

    const chatEl = document.getElementById('chat');
    const allMsgs = Array.from(chatEl.querySelectorAll('.msg'));
    const wrapIdx = allMsgs.indexOf(wrap);
    allMsgs.slice(wrapIdx + 1).forEach(g => g.remove());

    setTyping(true);
    try {
      const r = await callAPI(nt);
      setTyping(false);
      addDOM('b', r);
      conv.push({ role: 'assistant', content: r });
    } catch (e) {
      setTyping(false);
      addDOM('b', '⚠️ ' + e.message);
    }
  };

  btn.onclick = finish;
}

// ===== TYPING =====
function setTyping(on) {
  const t = document.getElementById('typing');
  t.style.display = on ? 'block' : 'none';
  if (on) document.getElementById('chat').scrollTop = 99999;
}

// Фокус
setTimeout(() => { if (key) inp.focus(); }, 400);
</script>
