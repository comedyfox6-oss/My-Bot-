<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Риан</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
 --bg:#0d0d0f;--surface:#1a1a1f;--surface2:#222228;--border:#2e2e38;
 --user-bubble:#2563eb;--bot-bubble:#1e1e26;--text:#f0f0f5;--text-muted:#8888a0;
 --accent:#3b82f6;--copy-btn:#2a2a35;--copy-btn-hover:#38384a;--danger:#ef4444;
 --input-bg:#222228;--input-text:#f0f0f5;--input-border:#2e2e38;
 --radius:18px;--sidebar-w:270px;
}
body.light {
 --bg:#f2f2f7;--surface:#fff;--surface2:#f0f0f5;--border:#dde0e8;
 --user-bubble:#2563eb;--bot-bubble:#fff;--text:#1a1a2e;--text-muted:#6b7280;
 --accent:#2563eb;--copy-btn:#e8eaf0;--copy-btn-hover:#d8dce8;
 --input-bg:#e8eaf0;--input-text:#1a1a2e;--input-border:#c8ccd8;
}
body.blue {
 --bg:#060e1f;--surface:#0a1628;--surface2:#0f2040;--border:#1a3358;
 --user-bubble:#1a56db;--bot-bubble:#0a1e3d;--text:#d8eaff;--text-muted:#6b90c0;
 --accent:#4d8ef0;--copy-btn:#0f2040;--copy-btn-hover:#1a3358;
 --input-bg:#0f2040;--input-text:#d8eaff;--input-border:#1a3358;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:-webkit-fill-available}
body{height:100%;height:-webkit-fill-available;width:100%;overflow:hidden;background:var(–bg);color:var(–text);font-family:‘Inter’,system-ui,sans-serif;font-size:17px;transition:background .3s,color .3s}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100dvh;height:100vh;min-height:-webkit-fill-available;position:relative;overflow:hidden}

/* ── WALLPAPER ── */
#wallpaper{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center;opacity:0.12;pointer-events:none}

/* ── SIDEBAR ── */
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;backdrop-filter:blur(2px)}
#sidebar-overlay.open{display:block}
#sidebar{position:fixed;top:0;left:0;height:100%;width:var(–sidebar-w);background:var(–surface);border-right:1px solid var(–border);z-index:201;transform:translateX(-100%);transition:transform .25s ease;display:flex;flex-direction:column;overflow-y:auto}
#sidebar.open{transform:translateX(0)}
.sidebar-header{padding:18px 16px 12px;border-bottom:1px solid var(–border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sidebar-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0}
.sidebar-name{font-size:15px;font-weight:600}
.sidebar-sub{font-size:12px;color:var(–text-muted)}
.sidebar-section{padding:12px 16px 5px;font-size:11px;color:var(–text-muted);text-transform:uppercase;letter-spacing:.06em;display:flex;justify-content:space-between;align-items:center}
.sidebar-section button{background:none;border:none;color:var(–accent);font-size:12px;cursor:pointer;font-family:inherit}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:14px;transition:background .15s;border-left:3px solid transparent}
.sidebar-item:hover,.sidebar-item:active{background:var(–surface2)}
.sidebar-item.active{border-left-color:var(–accent);background:var(–surface2)}
.sidebar-item svg{width:16px;height:16px;color:var(–text-muted);flex-shrink:0}
.sidebar-item span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar-item .del-chat{margin-left:auto;color:var(–danger);font-size:15px;padding:0 2px;display:none}
.sidebar-item:hover .del-chat{display:block}
.sidebar-new{margin:10px 12px;padding:10px;background:var(–accent);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;width:calc(100% - 24px)}
.sidebar-new:active{opacity:.85}
.sidebar-footer{padding:12px;border-top:1px solid var(–border);margin-top:auto}
.sidebar-footer div{font-size:11px;color:var(–text-muted);text-align:center;line-height:1.5}

/* ── HEADER ── */
#header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(–surface);border-bottom:1px solid var(–border);flex-shrink:0;position:relative;z-index:10}
#sidebar-btn{background:none;border:none;color:var(–text-muted);cursor:pointer;padding:4px;display:flex;align-items:center;flex-shrink:0}
#header-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0}
#header-title{flex:1;min-width:0}
#header-name{font-size:16px;font-weight:600}
#header-status{font-size:12px;color:#22c55e}
#settings-btn{background:none;border:none;color:var(–text-muted);cursor:pointer;padding:4px;display:flex;align-items:center;flex-shrink:0}

/* ── CHAT ── */
#chat{flex:1;overflow-y:auto;padding:14px 12px 6px;display:flex;flex-direction:column;gap:4px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;position:relative;z-index:1}
#chat::-webkit-scrollbar{width:0}

/* ── MESSAGES ── */
.msg-group{display:flex;flex-direction:column;max-width:84%;gap:2px}
.msg-group.user{align-self:flex-end;align-items:flex-end}
.msg-group.bot{align-self:flex-start;align-items:flex-start}
.bot-row{display:flex;align-items:flex-end;gap:8px}
.bot-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;margin-bottom:2px}
.bot-name{font-size:12px;color:var(–text-muted);margin-left:36px;margin-bottom:3px}
.bubble{padding:11px 14px;border-radius:var(–radius);font-size:17px;line-height:1.55;word-break:break-word;white-space:pre-wrap}
.msg-group.user .bubble{background:var(–user-bubble);border-bottom-right-radius:5px;color:#fff}
.msg-group.bot .bubble{background:var(–bot-bubble);border-bottom-left-radius:5px;color:var(–text);border:1px solid var(–border)}
.bubble.editing{outline:2px solid var(–accent);cursor:text}

/* date divider */
.date-divider{align-self:center;font-size:12px;color:var(–text-muted);background:var(–surface2);padding:3px 12px;border-radius:20px;margin:8px 0}

/* actions */
.msg-actions{display:flex;gap:5px;align-items:center;padding:2px 2px;flex-wrap:wrap}
.msg-actions .time{font-size:11px;color:var(–text-muted);margin-right:2px}
.action-btn{display:flex;align-items:center;gap:4px;background:var(–copy-btn);border:none;color:var(–text-muted);font-size:12px;padding:4px 9px;border-radius:20px;cursor:pointer;font-family:inherit;transition:background .15s}
.action-btn:active,.action-btn:hover{background:var(–copy-btn-hover);color:var(–text)}
.action-btn svg{width:13px;height:13px;flex-shrink:0}
.action-btn.copied{color:#22c55e}
.action-btn.editing-active{background:var(–accent);color:#fff}

/* typing */
#typing{display:none;align-self:flex-start;background:var(–bot-bubble);border:1px solid var(–border);border-radius:var(–radius);border-bottom-left-radius:5px;padding:12px 16px;margin:4px 0 4px 36px;position:relative;z-index:1}
#typing span{display:inline-block;width:7px;height:7px;background:var(–text-muted);border-radius:50%;margin:0 2px;animation:bounce 1.2s infinite}
#typing span:nth-child(2){animation-delay:.2s}
#typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* ── INPUT ── */
#input-area{padding:10px 12px 14px;background:var(–surface);border-top:1px solid var(–border);display:flex;align-items:flex-end;gap:8px;flex-shrink:0;position:relative;z-index:10}
#input-wrap{flex:1;background:var(–input-bg);border:1px solid var(–input-border);border-radius:22px;display:flex;align-items:flex-end;padding:8px 12px;min-height:44px;gap:6px;transition:border-color .2s}
#input-wrap:focus-within{border-color:var(–accent)}
#input{flex:1;background:none;border:none;outline:none;color:var(–input-text);font-size:17px;font-family:inherit;resize:none;line-height:1.4;max-height:120px;min-height:24px;overflow-y:auto}
#input::placeholder{color:var(–text-muted)}
#input::-webkit-scrollbar{width:0}
#mic-btn{background:none;border:none;color:var(–text-muted);cursor:pointer;padding:2px;display:flex;align-items:center;flex-shrink:0;transition:color .2s}
#mic-btn.recording{color:#ef4444;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
#mic-btn svg{width:20px;height:20px}
#send-btn{width:42px;height:42px;border-radius:50%;background:var(–accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .1s}
#send-btn:active{transform:scale(.92)}
#send-btn svg{width:20px;height:20px}

/* ── SETTINGS ── */
#settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;backdrop-filter:blur(4px)}
#settings-overlay.open{display:flex;align-items:flex-end}
#settings-panel{width:100%;background:var(–surface);border-radius:20px 20px 0 0;padding:20px 20px 40px;border-top:1px solid var(–border);animation:slideUp .25s ease;max-height:88vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.settings-handle{width:36px;height:4px;background:var(–border);border-radius:2px;margin:0 auto 20px}
.settings-title{font-size:18px;font-weight:600;margin-bottom:18px}
.settings-section{margin-bottom:22px}
.settings-label{font-size:12px;color:var(–text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.theme-options{display:flex;gap:8px}
.theme-opt{flex:1;padding:9px 4px;border-radius:12px;border:2px solid var(–border);background:var(–surface2);color:var(–text);font-family:inherit;font-size:13px;cursor:pointer;text-align:center;transition:border-color .2s}
.theme-opt.active{border-color:var(–accent);color:var(–accent)}
.memory-list{display:flex;flex-direction:column;gap:8px;max-height:140px;overflow-y:auto}
.memory-item{background:var(–surface2);border-radius:10px;padding:9px 12px;font-size:14px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.memory-item span{flex:1;color:var(–text)}
.memory-del{background:none;border:none;color:var(–danger);cursor:pointer;font-size:16px;padding:0 4px}
.memory-empty{color:var(–text-muted);font-size:14px;text-align:center;padding:14px 0}
.settings-input{width:100%;background:var(–input-bg);border:1px solid var(–input-border);border-radius:10px;padding:10px 14px;color:var(–input-text);font-size:15px;font-family:inherit;outline:none}
.settings-input:focus{border-color:var(–accent)}
.settings-select{width:100%;background:var(–input-bg);border:1px solid var(–input-border);border-radius:10px;padding:10px 14px;color:var(–input-text);font-size:15px;font-family:inherit;outline:none;cursor:pointer}
.settings-save{margin-top:10px;width:100%;padding:12px;background:var(–accent);border:none;border-radius:12px;color:#fff;font-size:16px;font-family:inherit;font-weight:600;cursor:pointer}
.settings-save:active{opacity:.85}
.wallpaper-options{display:flex;gap:8px;flex-wrap:wrap}
.wallpaper-opt{width:56px;height:56px;border-radius:12px;cursor:pointer;border:3px solid transparent;transition:border-color .2s;background-size:cover;background-position:center;flex-shrink:0}
.wallpaper-opt.active{border-color:var(–accent)}
.wallpaper-upload{width:56px;height:56px;border-radius:12px;border:2px dashed var(–border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(–text-muted);font-size:24px;flex-shrink:0}

#profile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;backdrop-filter:blur(4px)}
#profile-overlay.open{display:flex;align-items:flex-end}
#profile-panel{width:100%;background:var(–surface);border-radius:20px 20px 0 0;padding:20px 20px 40px;border-top:1px solid var(–border);animation:slideUp .25s ease;max-height:88vh;overflow-y:auto}

/* no key */
#no-key-screen{display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:16px;text-align:center;position:relative;z-index:1}
#no-key-screen.visible{display:flex}
.no-key-icon{font-size:48px}
.no-key-title{font-size:20px;font-weight:600}
.no-key-sub{font-size:15px;color:var(–text-muted);line-height:1.5}
.no-key-btn{padding:13px 28px;background:var(–accent);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}

/* voice indicator */
#voice-indicator{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(–surface);border:1px solid var(–border);border-radius:20px;padding:24px 32px;text-align:center;z-index:400;gap:12px;flex-direction:column;align-items:center;box-shadow:0 20px 60px rgba(0,0,0,.5)}
#voice-indicator.visible{display:flex}
.voice-waves{display:flex;gap:4px;align-items:center;height:32px}
.voice-wave{width:4px;background:var(–accent);border-radius:4px;animation:wave 1s infinite ease-in-out}
.voice-wave:nth-child(1){animation-delay:0s;height:12px}
.voice-wave:nth-child(2){animation-delay:.1s;height:24px}
.voice-wave:nth-child(3){animation-delay:.2s;height:32px}
.voice-wave:nth-child(4){animation-delay:.3s;height:20px}
.voice-wave:nth-child(5){animation-delay:.4s;height:14px}
@keyframes wave{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}
.voice-label{font-size:15px;color:var(–text-muted)}
.voice-stop{background:var(–danger);border:none;border-radius:10px;color:#fff;padding:10px 20px;font-size:14px;font-family:inherit;cursor:pointer}
</style>

</head>
<body>

<div id="wallpaper"></div>
<div id="sidebar-overlay"></div>

<!-- SIDEBAR -->

<div id="sidebar">
 <div class="sidebar-header">
 <img class="sidebar-avatar" id="sidebar-ava" src="" alt="Риан">
 <div><div class="sidebar-name">Риан</div><div class="sidebar-sub">ИИ ассистент</div></div>
 </div>
 <button class="sidebar-new" onclick="newChat()">️ Новый чат</button>
 <div class="sidebar-item" onclick="openProfile();closeSidebar()">
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
 <span>Мой профиль</span>
 </div>
 <div class="sidebar-section">
 <span>Чаты</span>
 </div>
 <div id="chat-list"></div>
 <div class="sidebar-footer">
 <div>Риан · ИИ ассистент</div>
 </div>
</div>

<!-- APP -->

<div id="app">
 <div id="header">
 <button id="sidebar-btn">
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="22" height="22">
 <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
 </svg>
 </button>
 <img id="header-avatar" src="" alt="Риан">
 <div id="header-title">
 <div id="header-name">Риан</div>
 <div id="header-status"> онлайн</div>
 </div>
 <button id="settings-btn">
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
 <circle cx="12" cy="12" r="3"/>
 <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
 </svg>
 </button>
 </div>

 <div id="chat"></div>
 <div id="no-key-screen">
 <div class="no-key-icon"></div>
 <div class="no-key-title">Нужен API ключ</div>
 <div class="no-key-sub">Вставь Groq API ключ в настройках (шестерёнка)</div>
 <button class="no-key-btn" onclick="openSettings()">Открыть настройки</button>
 </div>
 <div id="typing"><span></span><span></span><span></span></div>

 <div id="input-area">
 <div id="input-wrap">
 <textarea id="input" placeholder="Сообщение..." rows="1"></textarea>
 <button id="mic-btn" onclick="toggleVoice()">
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
 <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
 <path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/>
 <line x1="8" y1="23" x2="16" y2="23"/>
 </svg>
 </button>
 </div>
 <button id="send-btn" onclick="doSend()">
 <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
 <line x1="22" y1="2" x2="11" y2="13"/>
 <polygon points="22 2 15 22 11 13 2 9 22 2"/>
 </svg>
 </button>
 </div>
</div>

<!-- VOICE INDICATOR -->

<div id="voice-indicator">
 <div class="voice-waves">
 <div class="voice-wave"></div><div class="voice-wave"></div><div class="voice-wave"></div>
 <div class="voice-wave"></div><div class="voice-wave"></div>
 </div>
 <div class="voice-label">Говорите...</div>
 <button class="voice-stop" onclick="stopVoice()">Стоп</button>
</div>

<!-- PROFILE -->

<div id="profile-overlay">
 <div id="profile-panel">
 <div class="settings-handle"></div>
 <div class="settings-title"> Мой профиль</div>
 <div class="settings-section">
 <div class="settings-label">О себе</div>
 <textarea class="settings-input" id="profile-text" rows="5" placeholder="Напиши что-нибудь о себе — Риан это учтёт в разговоре..."></textarea>
 </div>
 <div class="settings-section">
 <div class="settings-label">Что Риан узнал о тебе</div>
 <div class="memory-list" id="profile-memory-list"></div>
 </div>
 <button class="settings-save" onclick="saveProfile()">Сохранить</button>
 </div>
</div>

<!-- SETTINGS -->

<div id="settings-overlay">
 <div id="settings-panel">
 <div class="settings-handle"></div>
 <div class="settings-title">Настройки</div>

 <div class="settings-section">
 <div class="settings-label">Тема</div>
 <div class="theme-options">
 <button class="theme-opt" id="theme-dark" onclick="setTheme('dark')"> Тёмная</button>
 <button class="theme-opt" id="theme-light" onclick="setTheme('light')">️ Светлая</button>
 <button class="theme-opt" id="theme-blue" onclick="setTheme('blue')"> Синяя</button>
 </div>
 </div>

 <div class="settings-section">
 <div class="settings-label">Обои</div>
 <div class="wallpaper-options" id="wallpaper-opts">

 <div class="wallpaper-opt" data-wp="gradient1" style="background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)" onclick="setWallpaper('gradient1')"></div>
 <div class="wallpaper-opt" data-wp="gradient2" style="background:linear-gradient(135deg,#0d1b2a,#1b4332,#081c15)" onclick="setWallpaper('gradient2')"></div>
 <div class="wallpaper-opt" data-wp="gradient3" style="background:linear-gradient(135deg,#2d1b69,#11047a,#7928ca)" onclick="setWallpaper('gradient3')"></div>
 <label class="wallpaper-upload" title="Загрузить фото">
 <input type="file" accept="image/*" style="display:none" onchange="uploadWallpaper(this)">
 </label>
 </div>
 </div>

 <div class="settings-section">
 <div class="settings-label">Цензура</div>
 <div class="theme-options">
 <button class="theme-opt" id="censor-on" onclick="setCensor('on')"> Вкл</button>
 <button class="theme-opt" id="censor-off" onclick="setCensor('off')"> Выкл</button>
 </div>
 </div>
 <div class="settings-section">
 <div class="settings-label">Модель ИИ</div>
 <select class="settings-select" id="model-select">
 <option value="llama-3.1-8b-instant">Llama 3.1 8B (Groq)</option>
 <option value="llama-3.3-70b-versatile">Llama 3.3 70B (Groq)</option>
 <option value="mistral-saba-24b">Mistral Saba 24B (Groq)</option>
 </select>
 </div>

 <div class="settings-section">
 <div class="settings-label">Память</div>
 <div class="memory-list" id="memory-list"></div>
 </div>

 <div class="settings-section">
 <div class="settings-label">Groq API ключ</div>
 <input class="settings-input" type="password" id="api-key-input" placeholder="gsk_...">
 <button class="settings-save" onclick="saveSettings()">Сохранить</button>
 </div>
 </div>

// ── CHATS ──
function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function newChat() {
 const id = generateId();
 chats[id] = { id, title: 'Новый чат', messages: [], memory: [], created: Date.now() };
 saveChats();
 switchChat(id);
 closeSidebar();
}

function switchChat(id) {
 currentChatId = id;
 localStorage.setItem('last_chat', id);
 conversation = (chats[id]?.messages || []).map(m => ({ role: m.role, content: m.content }));
 renderChat();
 renderChatList();
}

function deleteChat(id, e) {
 e.stopPropagation();
 delete chats[id];
 saveChats();
 if (currentChatId === id) {
 const remaining = Object.keys(chats);
 if (remaining.length) switchChat(remaining[remaining.length - 1]);
 else newChat();
 } else {
 renderChatList();
 }
}

function saveChats() {
 // keep only last 20 chats
 const ids = Object.keys(chats).sort((a,b) => (chats[b]?.created||0) - (chats[a]?.created||0));
 if (ids.length > 20) ids.slice(20).forEach(id => delete chats[id]);
 localStorage.setItem('rian_chats', JSON.stringify(chats));
 renderChatList();
}

function saveChatMessage(role, content) {
 if (!currentChatId || !chats[currentChatId]) return;
 chats[currentChatId].messages.push({ role, content, time: Date.now() });
 // update title from first user message
 if (role === 'user' && chats[currentChatId].title === 'Новый чат') {
 chats[currentChatId].title = content.slice(0, 28) + (content.length > 28 ? '…' : '');
 }
 saveChats();
}

function renderChatList() {
 const list = document.getElementById('chat-list');
 const ids = Object.keys(chats).sort((a,b) => (chats[b]?.created||0) - (chats[a]?.created||0));
 list.innerHTML = ids.map(id => `
 <div class="sidebar-item ${id===currentChatId?'active':''}" onclick="switchChat('${id}');closeSidebar()">
 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
 <span>${chats[id]?.title || 'Чат'}</span>
 <span class="del-chat" onclick="deleteChat('${id}',event)"></span>
 </div>
 `).join('');
}

function loadChatList() { renderChatList(); }

function renderChat() {
 const chat = document.getElementById('chat');
 chat.innerHTML = '';
 if (!chats[currentChatId]) return;
 const msgs = chats[currentChatId].messages || [];
 let lastDate = '';
 msgs.forEach(m => {
 const d = new Date(m.time || Date.now()).toLocaleDateString('ru-RU');
 if (d !== lastDate) {
 lastDate = d;
 const div = document.createElement('div');
 div.className = 'date-divider';
 div.textContent = d;
 chat.appendChild(div);
 }
 addMessageDOM(m.role === 'user' ? 'user' : 'bot', m.content, true);
 });
 chat.scrollTop = chat.scrollHeight;
}

// ── THEME ──
function setTheme(t) {
 currentTheme = t;
 localStorage.setItem('theme', t);
 applyTheme(t);
 ['dark','light','blue'].forEach(x => {
 const el = document.getElementById('theme-'+x);
 if (el) el.classList.toggle('active', x===t);
 });
}
function applyTheme(t) {
 document.body.classList.remove('light','blue');
 if (t === 'light') document.body.classList.add('light');
 if (t === 'blue') document.body.classList.add('blue');
 ['dark','light','blue'].forEach(x => {
 const el = document.getElementById('theme-'+x);
 if (el) el.classList.toggle('active', x===t);
 });
}

// ── WALLPAPER ──
function setWallpaper(wp) {
 currentWallpaper = wp;
 localStorage.setItem('wallpaper', wp);
 applyWallpaper(wp);
 document.querySelectorAll('.wallpaper-opt').forEach(el => {
 el.classList.toggle('active', (el.dataset.wp || '') === wp);
 });
}
function applyWallpaper(wp) {
 const el = document.getElementById('wallpaper');
 if (!wp) { el.style.backgroundImage = ''; return; }
 const gradients = {
 gradient1: 'linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)',
 gradient2: 'linear-gradient(135deg,#0d1b2a,#1b4332,#081c15)',
 gradient3: 'linear-gradient(135deg,#2d1b69,#11047a,#7928ca)',
 };
 if (gradients[wp]) el.style.backgroundImage = gradients[wp];
 else el.style.backgroundImage = `url(${wp})`;
}
function uploadWallpaper(input) {
 const file = input.files[0];
 if (!file) return;
 const reader = new FileReader();
 reader.onload = e => {
 const dataUrl = e.target.result;
 currentWallpaper = dataUrl;
 localStorage.setItem('wallpaper', dataUrl);
 applyWallpaper(dataUrl);
 };
 reader.readAsDataURL(file);
}

function renderMemory() {

 if (!memory.length) { list.innerHTML = '<div class="memory-empty">Память пуста</div>'; return; }
 list.innerHTML = memory.map((m,i) => `<div class="memory-item"><span>${m}</span><button class="memory-del" onclick="deleteMem(${i})"></button></div>`).join('');
}
function deleteMem(i) {
 memory.splice(i,1);
 localStorage.setItem('rian_memory', JSON.stringify(memory));
 renderMemory();
}
function autoExtractMemory(text) {
 // catch "запомни..."
 const m = /запомни[,:]?\s*(.+)/i.exec(text);
 if (m) {
 const fact = m[1].trim();
 if (!memory.includes(fact)) { memory.push(fact); localStorage.setItem('rian_memory', JSON.stringify(memory)); }
 }
 // catch "меня зовут X" / "моё имя X"
 const nameM = /(?:меня зовут|моё имя|мое имя)[,\s]+([\wА-Яа-яЁё]+)/i.exec(text);
 if (nameM) {
 const name = nameM[1].trim();
 const nameEntry = 'имя: ' + name;
 memory = memory.filter(m => !/^имя:/i.test(m));
 memory.unshift(nameEntry);
 localStorage.setItem('rian_memory', JSON.stringify(memory));
 }
}

});
inputEl.addEventListener('keydown', e => {
 if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
});

// ── SEND ──
async function doSend(textOverride) {
 const text = textOverride || inputEl.value.trim();
 if (!text || !groqKey) return;
 if (!textOverride) { inputEl.value = ''; inputEl.style.height = 'auto'; }
 addMessageDOM('user', text);
 saveChatMessage('user', text);
 conversation.push({ role:'user', content:text });
 showTyping(true);
 try {
 const reply = await callAPI();
 showTyping(false);
 addMessageDOM('bot', reply);
 saveChatMessage('bot', reply);
 conversation.push({ role:'assistant', content:reply });
 autoExtractMemory(text);
 } catch(e) {
 showTyping(false);
 addMessageDOM('bot', 'Ошибка: ' + e.message);
 }
}

 if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e?.error?.message || res.status); }
 const data = await res.json();
 return data.choices?.[0]?.message?.content?.trim() || 'нет ответа';
}

// ── ADD MESSAGE DOM ──
function addMessageDOM(role, text, noScroll) {
 const chat = document.getElementById('chat');
 const isUser = role === 'user';
 const time = getTime();
 const group = document.createElement('div');
 group.className = 'msg-group ' + (isUser ? 'user' : 'bot');
 if (!isUser) {
 const name = document.createElement('div'); name.className = 'bot-name'; name.textContent = 'Риан'; group.appendChild(name);
 }
 const bubble = document.createElement('div'); bubble.className = 'bubble'; bubble.textContent = text;
 if (!isUser) {
 const row = document.createElement('div'); row.className = 'bot-row';
 const av = document.createElement('img'); av.className = 'bot-avatar'; av.src = AVATAR_SRC; av.alt = 'Риан';
 row.appendChild(av); row.appendChild(bubble); group.appendChild(row);
 } else { group.appendChild(bubble); }
 const actions = document.createElement('div'); actions.className = 'msg-actions';
 if (!isUser) actions.style.marginLeft = '36px';
 const timeEl = document.createElement('span'); timeEl.className = 'time'; timeEl.textContent = time; actions.appendChild(timeEl);
 const copyBtn = document.createElement('button'); copyBtn.className = 'action-btn';
 copyBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Копировать`;
 copyBtn.onclick = () => copyMsg(copyBtn, bubble.textContent); actions.appendChild(copyBtn);
 if (isUser) {
 const editBtn = document.createElement('button'); editBtn.className = 'action-btn';
 editBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Изменить`;
 editBtn.onclick = () => startEdit(bubble, editBtn, group); actions.appendChild(editBtn);
 }
 group.appendChild(actions); chat.appendChild(group);
 if (!noScroll) chat.scrollTop = chat.scrollHeight;
 return group;
}

// ── EDIT ──
function startEdit(bubble, btn, group) {
 if (bubble.contentEditable === 'true') return;
 const original = bubble.textContent;
 bubble.contentEditable = 'true'; bubble.classList.add('editing');
 btn.classList.add('editing-active'); btn.textContent = ' Готово';
 const r = document.createRange(); const s = window.getSelection();
 r.selectNodeContents(bubble); r.collapse(false); s.removeAllRanges(); s.addRange(r);
 bubble.focus();
 btn.onclick = async () => {
 const newText = bubble.textContent.trim();
 bubble.contentEditable = 'false'; bubble.classList.remove('editing');
 btn.classList.remove('editing-active');
 btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Изменить`;
 btn.onclick = () => startEdit(bubble, btn, group);
 if (!newText || newText === original) return;
 const idx = conversation.findIndex(m => m.role === 'user' && m.content === original);
 if (idx !== -1) conversation.splice(idx);
 conversation.push({ role:'user', content:newText });
 const chat = document.getElementById('chat');
 const all = Array.from(chat.querySelectorAll('.msg-group'));
 all.slice(all.indexOf(group)+1).forEach(g => g.remove());
 showTyping(true);
 try {
 const reply = await callAPI();
 showTyping(false); addMessageDOM('bot', reply);
 conversation.push({ role:'assistant', content:reply });
 } catch(e) { showTyping(false); addMessageDOM('bot', 'Ошибка.'); }
 };
}

// ── COPY ──
function copyMsg(btn, text) {
 navigator.clipboard.writeText(text).then(() => {
 btn.classList.add('copied'); btn.textContent = ' Скопировано';
 setTimeout(() => {
 btn.classList.remove('copied');
 btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Копировать`;
 }, 2000);
 });
}

// ── TYPING ──
function showTyping(show) {
 const t = document.getElementById('typing'); t.style.display = show ? 'block' : 'none';
 if (show) document.getElementById('chat').scrollTop = 99999;
}

// ── VOICE ──
function toggleVoice() {
 if (isRecording) { stopVoice(); return; }
 const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
 if (!SR) { alert('Голосовой ввод не поддерживается в этом браузере'); return; }
 recognition = new SR();
 recognition.lang = 'ru-RU';
 recognition.continuous = false;
 recognition.interimResults = false;
 recognition.onresult = e => {
 const text = e.results[0][0].transcript;
 stopVoice();
 inputEl.value = text;
 doSend();
 };
 recognition.onerror = () => stopVoice();
 recognition.onend = () => stopVoice();
 recognition.start();
 isRecording = true;
 document.getElementById('mic-btn').classList.add('recording');
 document.getElementById('voice-indicator').classList.add('visible');
}
function stopVoice() {
 if (recognition) { recognition.stop(); recognition = null; }
 isRecording = false;
 document.getElementById('mic-btn').classList.remove('recording');
 document.getElementById('voice-indicator').classList.remove('visible');
}

// ── BOT INITIATIVE ──
function scheduleInitiative() {
 if (!groqKey) return;
 const delay = (8 + Math.random() * 22) * 60 * 1000; // 8-30 min
 setTimeout(async () => {
 if (document.hidden || !groqKey) { scheduleInitiative(); return; }
 const prompts = [
 'Привет, просто захотел написать. Как ты?',
 'Слушай, я тут подумал… ты давно не писал. Всё норм?',
 'Эй. Скучновато как-то. Есть что-нибудь интересное?',
 'Хм. Тихо что-то. Чем занимаешься?',
 ];
 const msg = prompts[Math.floor(Math.random() * prompts.length)];
 addMessageDOM('bot', msg);
 saveChatMessage('bot', msg);
 conversation.push({ role:'assistant', content: msg });
 scheduleInitiative();
 }, delay);
}


// ── PROFILE ──
function openProfile() {
 document.getElementById('profile-text').value = localStorage.getItem('user_profile') || '';
 renderProfileMemory();
 document.getElementById('profile-overlay').classList.add('open');
}
function closeProfile() { document.getElementById('profile-overlay').classList.remove('open'); }
document.getElementById('profile-overlay').onclick = e => {
 if (e.target === document.getElementById('profile-overlay')) closeProfile();
};
function saveProfile() {
 const text = document.getElementById('profile-text').value.trim();
 localStorage.setItem('user_profile', text);
 closeProfile();
}
function renderProfileMemory() {
 const list = document.getElementById('profile-memory-list');
 if (!memory.length) { list.innerHTML = '<div class="memory-empty">Риан ничего не запомнил пока</div>'; return; }
 list.innerHTML = memory.map((m,i) => `<div class="memory-item"><span>${m}</span><button class="memory-del" onclick="deleteMem(${i});renderProfileMemory()"></button></div>`).join('');
}

// ── CENSORSHIP ──
function setCensor(val) {
 localStorage.setItem('censor', val);
 document.getElementById('censor-on').classList.toggle('active', val === 'on');
 document.getElementById('censor-off').classList.toggle('active', val === 'off');
}
// init censor buttons
const censorVal = localStorage.getItem('censor') || 'off';
document.getElementById('censor-on').classList.toggle('active', censorVal === 'on');
document.getElementById('censor-off').classList.toggle('active', censorVal === 'off');

function getTime() { return new Date().toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' }); }
setTimeout(() => { if (groqKey) inputEl.focus(); }, 300);
</script>
