<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Риан</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:-webkit-fill-available}
:root{
  --bg:#0d0d10;--surface:#141417;--surface2:#1c1c21;--border:#272730;
  --text:#eeeef5;--text2:#888;
  --user-bg:#2563eb;--user-text:#fff;
  --bot-bg:#1a1a22;--bot-text:#eeeef5;
  --btn-bg:#1a1a22;--btn-border:#272730;--btn-text:#666;
  --inp-bg:#1c1c21;--inp-text:#eeeef5;--inp-ph:#555;
  --accent:#3b82f6;--accent2:#1d4ed8;
  --sep-bg:#1c1c21;--sep-text:#444;--online:#22c55e;
}
.light{
  --bg:#f0f2f5;--surface:#fff;--surface2:#e5e7eb;--border:#d1d5db;
  --text:#111827;--text2:#6b7280;
  --user-bg:#2563eb;--user-text:#fff;
  --bot-bg:#fff;--bot-text:#111827;
  --btn-bg:#e5e7eb;--btn-border:#d1d5db;--btn-text:#6b7280;
  --inp-bg:#fff;--inp-text:#111827;--inp-ph:#9ca3af;
  --accent:#2563eb;--accent2:#1d4ed8;
  --sep-bg:#e5e7eb;--sep-text:#9ca3af;--online:#16a34a;
}
body{font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:16px;background:var(--bg);color:var(--text);height:100dvh;height:100vh;min-height:-webkit-fill-available;overflow:hidden;display:flex;flex-direction:column}
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
#ov.on{display:block}
#sb{width:270px;height:100%;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100;transform:translateX(-100%);transition:transform .22s ease}
#sb.on{transform:translateX(0)}
.sb-top{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.sb-av{position:relative;flex-shrink:0}
.sb-av img{width:38px;height:38px;border-radius:50%;object-fit:cover}
.sb-dot{position:absolute;bottom:0;right:0;width:10px;height:10px;border-radius:50%;background:var(--online);border:2px solid var(--surface)}
.sb-name{font-size:15px;font-weight:700;color:var(--text)}
.sb-sub{font-size:12px;color:var(--text2);margin-top:1px}
.sb-new{margin:10px;padding:10px 14px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:7px}
.sb-new:active{background:var(--accent2)}
.sb-sec{padding:10px 16px 4px;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
#cl{flex:1;overflow-y:auto;padding:0 6px}
#cl::-webkit-scrollbar{width:0}
.ci{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;cursor:pointer;color:var(--text);transition:background .1s;margin-bottom:1px}
.ci:hover{background:var(--surface2)}
.ci.on{background:rgba(59,130,246,.13);color:var(--accent)}
.ci svg{width:14px;height:14px;opacity:.4;flex-shrink:0}
.ci-t{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px}
.ci-d{color:var(--text2);font-size:13px;padding:2px 5px;display:none}
.ci:hover .ci-d{display:block}
.ci-d:hover{color:#ef4444}
.sb-art{padding:12px 10px 16px;display:flex;justify-content:center;border-top:1px solid var(--border);margin-top:auto}
.sb-art img{width:155px;height:auto;object-fit:contain;opacity:0.93;filter:drop-shadow(0 2px 12px rgba(59,130,246,0.22))}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.hbtn{background:none;border:none;color:var(--text2);cursor:pointer;padding:5px;display:flex;align-items:center;border-radius:8px}
.hbtn:hover{background:var(--surface2)}
.hdr-av{position:relative;flex-shrink:0}
.hdr-av img{width:34px;height:34px;border-radius:50%;object-fit:cover}
.hdr-dot{position:absolute;bottom:0;right:0;width:9px;height:9px;border-radius:50%;background:var(--online);border:2px solid var(--surface)}
#hdr-info{flex:1}
#hdr-name{font-size:15px;font-weight:700;color:var(--text)}
#hdr-status{font-size:12px;color:var(--online)}
#chat{flex:1;overflow-y:auto;padding:14px 12px 8px;display:flex;flex-direction:column;gap:6px;-webkit-overflow-scrolling:touch;background:var(--bg)}
#chat::-webkit-scrollbar{width:0}
.dsep{align-self:center;font-size:12px;color:var(--sep-text);background:var(--sep-bg);padding:3px 12px;border-radius:20px;margin:4px 0}
.msg{display:flex;flex-direction:column;max-width:84%;gap:3px}
.msg.u{align-self:flex-end;align-items:flex-end}
.msg.b{align-self:flex-start;align-items:flex-start}
.b-row{display:flex;align-items:flex-end;gap:7px}
.b-av{width:26px;height:26px;border-radius:50%;object-fit:cover;flex-shrink:0}
.b-lbl{font-size:11px;color:var(--text2);margin-left:33px;margin-bottom:2px}
.bbl{padding:10px 14px;border-radius:18px;font-size:16px;line-height:1.55;word-break:break-word;white-space:pre-wrap}
.msg.u .bbl{background:var(--user-bg)!important;color:var(--user-text)!important;-webkit-text-fill-color:var(--user-text)!important;border-bottom-right-radius:4px}
.msg.b .bbl{background:var(--bot-bg)!important;color:var(--bot-text)!important;-webkit-text-fill-color:var(--bot-text)!important;border:1px solid var(--border);border-bottom-left-radius:4px}
.bbl.ed{outline:2px solid var(--accent);cursor:text}
.typing-bubble{align-self:flex-start;background:var(--bot-bg)!important;border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:4px;padding:12px 16px;margin-left:33px}
.typing-bubble span{display:inline-block;width:6px;height:6px;background:var(--text2);border-radius:50%;margin:0 2px;animation:bc 1.2s infinite}
.typing-bubble span:nth-child(2){animation-delay:.2s}
.typing-bubble span:nth-child(3){animation-delay:.4s}
@keyframes bc{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.acts{display:flex;gap:4px;align-items:center;padding:2px 0;flex-wrap:wrap}
.msg.b .acts{margin-left:33px}
.ts{font-size:11px;color:var(--text2);margin-right:2px}
.abtn{display:flex;align-items:center;background:var(--btn-bg);border:1px solid var(--btn-border);color:var(--btn-text);font-size:12px;padding:3px 9px;border-radius:20px;cursor:pointer;font-family:inherit;transition:all .1s}
.abtn:hover{color:var(--text);border-color:var(--text2)}
.abtn.ok{color:#22c55e;border-color:#22c55e}
.abtn.act{background:var(--accent);color:#fff;border-color:var(--accent)}
#inp-area{padding:12px 14px 20px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
#inp-wrap{display:flex;align-items:flex-end;gap:10px;background:var(--inp-bg);border:2px solid var(--accent);border-radius:18px;padding:10px 10px 10px 16px;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
#inp-wrap:focus-within{box-shadow:0 0 0 4px rgba(59,130,246,.25)}
#inp{flex:1;background:transparent;border:none;outline:none;color:var(--inp-text);font-size:16px;font-family:inherit;resize:none;line-height:1.5;max-height:150px;min-height:26px;overflow-y:auto;caret-color:var(--accent)}
#inp::placeholder{color:var(--inp-ph)}
#inp::-webkit-scrollbar{width:0}
#send{width:38px;height:38px;border-radius:12px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.5;transition:opacity .15s,transform .1s}
#send.rdy{opacity:1}
#send:active{transform:scale(.9)}
#so{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end;justify-content:center}
#so.on{display:flex}
#sp{background:var(--surface);border:1px solid var(--border);border-radius:22px 22px 0 0;padding:20px 20px 36px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;animation:su .25s ease}
@keyframes su{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.sh h2{font-size:17px;font-weight:700;color:var(--text)}
.sc{background:var(--surface2);border:none;color:var(--text2);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.sl{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:8px}
.ss{margin-bottom:22px}
.sbtns{display:flex;gap:8px}
.sbtn{flex:1;padding:11px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;text-align:center;transition:all .12s}
.sbtn.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
.si{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text)!important;-webkit-text-fill-color:var(--text)!important;font-size:15px;font-family:inherit;outline:none;margin-top:7px}
.si:focus{border-color:var(--accent)}
.sh2{font-size:12px;color:var(--text2);margin-top:6px;line-height:1.5}
.sv{width:100%;margin-top:12px;padding:14px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
.sv:active{background:var(--accent2)}
.ml{display:flex;flex-direction:column;gap:6px;max-height:130px;overflow-y:auto}
.mi{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:14px;display:flex;justify-content:space-between;align-items:center;gap:8px;color:var(--text)}
.mi button{background:none;border:none;color:var(--text2);cursor:pointer;font-size:14px}
.mi button:hover{color:#ef4444}
.me{color:var(--text2);font-size:14px;text-align:center;padding:10px 0}
</style>
</head>

<div id="so">
  <div id="sp">
    <div class="sh"><h2>Настройки</h2><button class="sc" id="btn-close-s">✕</button></div>
    <div class="ss">
      <div class="sl">Тема</div>
      <div class="sbtns">
        <button class="sbtn" id="t-dark" onclick="setTheme('dark')">Тёмная</button>
        <button class="sbtn" id="t-light" onclick="setTheme('light')">Светлая</button>
      </div>
    </div>
    <div class="ss">
      <div class="sl">API ключ</div>
      <input class="si" type="password" id="api-inp" placeholder="gsk_... (Groq)">
      <div class="sh2">Groq API (gsk_...)</div>
      <button class="sv" id="btn-save">Сохранить</button>
    </div>
    <div class="ss">
      <div class="sl">Память</div>
      <div class="ml" id="mem-list"></div>
    </div>
  </div>

<script>
// ── состояние ────────────────────────────────────────────────────────────────
let key    = localStorage.getItem("gk") || "";
let mem    = JSON.parse(localStorage.getItem("rm") || "[]");
let chats  = JSON.parse(localStorage.getItem("rc") || "{}");
let cid    = null;
let conv   = [];
let theme  = localStorage.getItem("th") || "dark";
let typingEl = null;

applyTheme(theme);
renderChatList();
const last = localStorage.getItem("lc");
if (last && chats[last]) switchChat(last); else newChat();

// ── кнопки ───────────────────────────────────────────────────────────────────
document.getElementById("btn-menu").addEventListener("click", openSB);
document.getElementById("ov").addEventListener("click", closeSB);
document.getElementById("btn-new").addEventListener("click", () => { newChat(); closeSB(); });
document.getElementById("btn-settings").addEventListener("click", openSettings);
document.getElementById("btn-close-s").addEventListener("click", closeSettings);
document.getElementById("btn-save").addEventListener("click", saveSettings);
document.getElementById("so").addEventListener("click", e => { if (e.target === document.getElementById("so")) closeSettings(); });
document.getElementById("send").addEventListener("click", doSend);

// ── поле ввода ───────────────────────────────────────────────────────────────
const inp = document.getElementById("inp");
inp.addEventListener("input", () => {
  inp.style.height = "auto";
  inp.style.height = Math.min(inp.scrollHeight, 150) + "px";
  document.getElementById("send").classList.toggle("rdy", inp.value.trim().length > 0);
});
inp.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); doSend(); }
});

// ── тема ──────────────────────────────────────────────────────────────────────
function setTheme(t) {
  theme = t;
  localStorage.setItem("th", t);
  applyTheme(t);
}
function applyTheme(t) {
  document.body.classList.toggle("light", t === "light");
  document.getElementById("t-dark").classList.toggle("on", t !== "light");
  document.getElementById("t-light").classList.toggle("on", t === "light");
}

// ── сайдбар ───────────────────────────────────────────────────────────────────
function openSB()  { document.getElementById("sb").classList.add("on");  document.getElementById("ov").classList.add("on"); }
function closeSB() { document.getElementById("sb").classList.remove("on"); document.getElementById("ov").classList.remove("on"); }

// ── настройки ─────────────────────────────────────────────────────────────────
function openSettings()  { document.getElementById("api-inp").value = key; renderMem(); document.getElementById("so").classList.add("on"); }
function closeSettings() { document.getElementById("so").classList.remove("on"); }
function saveSettings()  { key = document.getElementById("api-inp").value.trim(); localStorage.setItem("gk", key); closeSettings(); }

// ── чаты ──────────────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }

function newChat() {
  const id = uid();
  chats[id] = { id, title: "Новый чат", msgs: [], created: Date.now() };
  save();
  switchChat(id);
}

function switchChat(id) {
  cid  = id;
  localStorage.setItem("lc", id);
  conv = (chats[id]?.msgs || [])
    .filter(m => m.r === "user" || m.r === "assistant")
    .map(m => ({ role: m.r, content: m.c }));
  renderChat();
  renderChatList();
}

function delChat(id, e) {
  e.stopPropagation();
  delete chats[id];
  save();
  const ids = Object.keys(chats);
  if (ids.length) switchChat(ids[ids.length - 1]); else newChat();
}

function save() { localStorage.setItem("rc", JSON.stringify(chats)); renderChatList(); }

function pushMsg(r, c) {
  if (!cid || !chats[cid]) return;
  chats[cid].msgs.push({ r, c, ts: Date.now() });
  if (r === "user" && chats[cid].title === "Новый чат")
    chats[cid].title = c.slice(0, 28) + (c.length > 28 ? "…" : "");
  save();
}

function renderChatList() {
  const list = document.getElementById("cl");
  const ids  = Object.keys(chats).sort((a,b) => (chats[b]?.created||0) - (chats[a]?.created||0));
  list.innerHTML = ids.map(id => {
    const active = id === cid ? "on" : "";
    const title  = chats[id]?.title || "Чат";
    return `<div class="ci ${active}" onclick="switchChat('${id}');closeSB()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="ci-t">${title}</span>
      <span class="ci-d" onclick="delChat('${id}',event)">✕</span>
    </div>`;
  }).join("");
}

function renderChat() {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";
  typingEl = null;
  if (!chats[cid]) return;
  let ld = "";
  (chats[cid].msgs || []).forEach(m => {
    if (m.r !== "user" && m.r !== "assistant") return;
    const d = new Date(m.ts || Date.now()).toLocaleDateString("ru-RU");
    if (d !== ld) {
      ld = d;
      const s = document.createElement("div");
      s.className = "dsep"; s.textContent = d;
      chat.appendChild(s);
    }
    addDOM(m.r === "user" ? "u" : "b", m.c, true);
  });
  chat.scrollTop = chat.scrollHeight;
}

// ── память ────────────────────────────────────────────────────────────────────
function renderMem() {
  const list = document.getElementById("mem-list");
  if (!mem.length) { list.innerHTML = '<div class="me">Пусто</div>'; return; }
  list.innerHTML = mem.map((m,i) =>
    `<div class="mi"><span>${m}</span><button onclick="delMem(${i})">✕</button></div>`
  ).join("");
}
function delMem(i) { mem.splice(i,1); localStorage.setItem("rm", JSON.stringify(mem)); renderMem(); }
function extractMem(text) {
  const m1 = /запомни[,:]?\s*(.+)/i.exec(text);
  if (m1) { const f = m1[1].trim(); if (!mem.includes(f)) { mem.push(f); localStorage.setItem("rm", JSON.stringify(mem)); } }
  const m2 = /(?:меня зовут|моё имя|мое имя)[\s,]+([а-яёА-ЯЁa-zA-Z]+)/i.exec(text);
  if (m2) { const n = "имя: " + m2[1].trim(); mem = mem.filter(x => !/^имя:/i.test(x)); mem.unshift(n); localStorage.setItem("rm", JSON.stringify(mem)); }
}

// ── отправка ──────────────────────────────────────────────────────────────────
async function doSend() {
  const text = inp.value.trim();
  if (!text) return;
  if (!key) { addDOM("b", "⚠️ Добавь API ключ в настройках (Groq)"); return; }
  inp.value = ""; inp.style.height = "auto";
  document.getElementById("send").classList.remove("rdy");
  addDOM("u", text);
  pushMsg("user", text);
  conv.push({ role: "user", content: text });
  showTyping(true);
  try {
    const reply = await callAPI();
    showTyping(false);
    addDOM("b", reply);
    pushMsg("assistant", reply);
    conv.push({ role: "assistant", content: reply });
    extractMem(text);
  } catch(e) {
    showTyping(false);
    addDOM("b", "⚠️ " + (e.message || "Что-то пошло не так"));
  }
}

// ── индикатор набора ──────────────────────────────────────────────────────────
function showTyping(on) {
  const chat = document.getElementById("chat");
  if (on) {
    if (typingEl) typingEl.remove();
    typingEl = document.createElement("div");
    typingEl.className = "typing-bubble";
    typingEl.innerHTML = "<span></span><span></span><span></span>";
    chat.appendChild(typingEl);
    chat.scrollTop = chat.scrollHeight;
  } else { if (typingEl) { typingEl.remove(); typingEl = null; } }
}

// ── API (только Groq) ─────────────────────────────────────────────────────────
async function callAPI() {
  const name   = mem.find(m => /^имя:/i.test(m))?.replace(/^имя:\s*/i, "") || "";
  const memStr = mem.length ? "\n\nЗнаешь о собеседнике:\n" + mem.map(x => "- " + x).join("\n") + "\n\nИспользуй живо, не перечисляй." : "";
  const nameStr = name ? ` Собеседника зовут ${name}. Обращайся по имени иногда.` : "";
  const sys = `Ты Риан.${nameStr}\n\nНе говори что ты ИИ. Живи в разговоре как человек.\n\nХарактер: тёплый но не приторный. Злишься когда раздражают. Смеёшься когда смешно. Имеешь мнение. Иногда задаёшь вопросы.\n\nРечь: грамотный русский. Правильные падежи. Разговорный стиль. Коротко и живо.${memStr}`;
  const messages = conv.filter(m => m.role === "user" || m.role === "assistant").slice(-40);

  // ── Groq ──────────────────────────────────────────────────────────────────
  const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: { "Authorization": "Bearer " + key, "Content-Type": "application/json" },
    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role:"system", content:sys }, ...messages], max_tokens: 1024, temperature: 0.72, frequency_penalty: 0.3 })
  });
  if (!res.ok) {
    const j = await res.json().catch(() => ({}));
    if (res.status === 401) throw new Error("Неверный API ключ Groq");
    if (res.status === 429) throw new Error("Превышен лимит Groq — подожди немного");
    throw new Error(j?.error?.message || "Ошибка Groq " + res.status);
  }
  const d = await res.json();
  return d?.choices?.[0]?.message?.content?.trim() || "...";
}

// ── добавить сообщение в DOM ──────────────────────────────────────────────────
function addDOM(role, text, noScroll) {
  const chat = document.getElementById("chat");
  const isU  = role === "u";
  const t    = new Date().toLocaleTimeString("ru-RU", { hour:"2-digit", minute:"2-digit" });

  const wrap = document.createElement("div");
  wrap.className = "msg " + (isU ? "u" : "b");

  const bbl = document.createElement("div");
  bbl.className = "bbl";
  bbl.textContent = text;

  if (!isU) {
    const lbl = document.createElement("div"); lbl.className = "b-lbl"; lbl.textContent = "Риан"; wrap.appendChild(lbl);
    const row = document.createElement("div"); row.className = "b-row";
    const av  = document.createElement("img"); av.className = "b-av"; av.src = document.getElementById("hdrav").src;
    row.appendChild(av); row.appendChild(bbl); wrap.appendChild(row);
  } else { wrap.appendChild(bbl); }

  const acts = document.createElement("div"); acts.className = "acts";
  if (!isU) acts.style.marginLeft = "33px";

  const ts = document.createElement("span"); ts.className = "ts"; ts.textContent = t; acts.appendChild(ts);

  const cp = document.createElement("button"); cp.className = "abtn"; cp.textContent = "Копировать";
  cp.onclick = () => {
    const val = bbl.textContent;
    navigator.clipboard ? navigator.clipboard.writeText(val).catch(() => fbCopy(val)) : fbCopy(val);
    cp.textContent = "Скопировано"; cp.classList.add("ok");
    setTimeout(() => { cp.textContent = "Копировать"; cp.classList.remove("ok"); }, 2000);
  };
  acts.appendChild(cp);

  if (isU) {
    const eb = document.createElement("button"); eb.className = "abtn"; eb.textContent = "Изменить";
    eb.onclick = () => startEdit(bbl, eb, wrap);
    acts.appendChild(eb);
  }

  wrap.appendChild(acts);
  chat.appendChild(wrap);
  if (!noScroll) chat.scrollTop = chat.scrollHeight;
  return wrap;
}

function fbCopy(text) {
  const ta = document.createElement("textarea"); ta.value = text; ta.style.cssText = "position:fixed;opacity:0";
  document.body.appendChild(ta); ta.select();
  try { document.execCommand("copy"); } catch(e) {}
  document.body.removeChild(ta);
}

function startEdit(bbl, btn, wrap) {
  if (bbl.contentEditable === "true") return;
  const orig = bbl.textContent;
  bbl.contentEditable = "true"; bbl.classList.add("ed");
  btn.textContent = "Готово"; btn.classList.add("act");
  const r = document.createRange(), s = window.getSelection();
  r.selectNodeContents(bbl); r.collapse(false); s.removeAllRanges(); s.addRange(r); bbl.focus();
  btn.onclick = async () => {
    const nt = bbl.textContent.trim();
    bbl.contentEditable = "false"; bbl.classList.remove("ed");
    btn.textContent = "Изменить"; btn.classList.remove("act");
    btn.onclick = () => startEdit(bbl, btn, wrap);
    if (!nt || nt === orig) return;
    const idx = [...conv].reverse().findIndex(m => m.role === "user" && m.content === orig);
    if (idx !== -1) conv.splice(conv.length - 1 - idx);
    conv.push({ role: "user", content: nt });
    const chat = document.getElementById("chat");
    Array.from(chat.querySelectorAll(".msg")).slice(Array.from(chat.querySelectorAll(".msg")).indexOf(wrap) + 1).forEach(g => g.remove());
    showTyping(true);
    try { const r = await callAPI(); showTyping(false); addDOM("b", r); conv.push({ role:"assistant", content:r }); }
    catch(e) { showTyping(false); addDOM("b", "⚠️ " + e.message); }
  };
}

setTimeout(() => inp.focus(), 400);
</script>
