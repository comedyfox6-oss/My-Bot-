<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Риан</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ТВОИ ОРИГИНАЛЬНЫЕ ПЕРЕМЕННЫЕ */
:root {
 --bg:#0d0d0f;--surface:#1a1a1f;--surface2:#222228;--border:#2e2e38;
 --user-bubble:#2563eb;--bot-bubble:#1e1e26;--text:#f0f0f5;--text-muted:#8888a0;
 --accent:#3b82f6;--copy-btn:#2a2a35;--copy-btn-hover:#38384a;--danger:#ef4444;
 --input-bg:#222228;--input-text:#f0f0f5;--input-border:#2e2e38;
 --radius:18px;--sidebar-w:270px;
}
body.light {
 --bg:#f5f5f7;--surface:#ffffff;--surface2:#f0f0f2;--border:#e5e5e7;
 --user-bubble:#007aff;--bot-bubble:#e9e9eb;--text:#1a1a1f;--text-muted:#6e6e73;
 --accent:#007aff;--copy-btn:#e5e5e7;--copy-btn-hover:#d1d1d6;--input-bg:#ffffff;
 --input-text:#1a1a1f;--input-border:#e5e5e7;
}
body.blue {
 --bg:#0a192f;--surface:#112240;--surface2:#1d2d50;--border:#233554;
 --user-bubble:#64ffda;--bot-bubble:#172a45;--text:#ccd6f6;--text-muted:#8892b0;
 --accent:#64ffda;--copy-btn:#233554;--copy-btn-hover:#304567;--input-bg:#112240;
 --input-text:#ccd6f6;--input-border:#233554;
}

/* ТВОЙ СТИЛЬ БЕЗ ИЗМЕНЕНИЙ (только фикс бургера) */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); transition: background 0.3s, color 0.3s; overflow:hidden; height:100vh; }

.sidebar {
 position:fixed; top:0; left:calc(-1 * var(--sidebar-w)); width:var(--sidebar-w); height:100%;
 background:var(--surface); /* УБРАЛ ПРОЗРАЧНОСТЬ */
 border-right:1px solid var(--border); transition:left 0.3s cubic-bezier(0.4,0,0.2,1); z-index:1000;
 display:flex; flex-direction:column;
}
.sidebar.open { left:0; }

.theme-option {
 padding:12px 16px; margin:4px 12px; border-radius:12px; cursor:pointer;
 display:flex; align-items:center; justify-content:space-between; transition:0.2s;
 background: var(--surface2); border: 1px solid var(--border); margin-bottom: 8px;
}
.theme-option.active { border-color:var(--accent); background:var(--surface2); }
.theme-option:hover { background:var(--surface2); opacity: 0.8; }

/* Остальные твои стили (аватарки, чат и тд) оставляю как были в твоем файле */
.header { height:60px; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 16px; gap:12px; position:sticky; top:0; background:var(--bg); z-index:100; }
.avatar { width:40px; height:40px; border-radius:12px; object-fit:cover; background:var(--surface2); }
.burger { width:40px; height:40px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:24px; }
/* ... (здесь все твои стили из докса) ... */
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div style="padding:24px; font-weight:600; font-size:18px;">Настройки</div>
    <div style="padding:0 24px 12px; font-size:14px; color:var(--text-muted);">Тема оформления</div>
    
    <div class="theme-option" id="btn-dark" onclick="setTheme('dark')">
        <span>Тёмная</span>
        <div class="radio"></div>
    </div>
    <div class="theme-option" id="btn-light" onclick="setTheme('light')">
        <span>Светлая</span>
        <div class="radio"></div>
    </div>
    <div class="theme-option" id="btn-blue" onclick="setTheme('blue')">
        <span>Синяя</span>
        <div class="radio"></div>
    </div>
    
    <button onclick="toggleSidebar()" style="margin:20px; padding:10px; border-radius:10px; border:none; background:var(--accent); color:#fff;">Закрыть</button>
</div>

<div class="header">
    <div class="burger" onclick="toggleSidebar()">☰</div>
    <img src="https://i.pravatar.cc/100?img=11" class="avatar" alt="Rian">
    <div>
        <div style="font-weight:600;">Риан</div>
        <div style="font-size:12px; color:#10b981;">• Online</div>
    </div>
</div>

<div id="chat-container" style="height:calc(100vh - 130px); overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:16px;">
    </div>

<script>
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
}

function setTheme(theme) {
    // 1. Убираем классы с body
    document.body.classList.remove('light', 'blue');
    if(theme !== 'dark') document.body.classList.add(theme);
    
    // 2. Визуально подсвечиваем выбранную кнопку
    document.querySelectorAll('.theme-option').forEach(el => el.classList.remove('active'));
    document.getElementById('btn-' + theme).classList.add('active');
    
    // 3. Сохраняем
    localStorage.setItem('rian_theme', theme);
}

// При загрузке применяем сохраненную тему
window.onload = () => {
    const saved = localStorage.getItem('rian_theme') || 'dark';
    setTheme(saved);
};

// Твоя логика чата (заглушка)
function addMessage(text, isUser) {
    const chat = document.getElementById('chat-container');
    const msg = document.createElement('div');
    msg.style = isUser 
        ? "align-self:flex-end; background:var(--user-bubble); color:#fff; padding:12px; border-radius:15px; max-width:80%;"
        : "align-self:flex-start; background:var(--bot-bubble); color:var(--text); padding:12px; border-radius:15px; max-width:80%;";
    msg.innerText = text;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
